<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>You Are Not Finished — Ian James</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&family=Fraunces:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>html,body{margin:0;padding:0;background:#FAF7F2;color:#111;font-family:"Inter",-apple-system,sans-serif}*{box-sizing:border-box}a{color:inherit}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head><body><div id="root"></div>
<script src="lib/tokens.js"></script><script type="text/babel" src="lib/components.jsx"></script>
<script type="text/babel">
const T = window.IJ_TOKENS;

function Hero() {
  return (
    <section style={{ background: T.color.ink, color: T.color.page, padding: '80px 56px 100px' }}>
      <div style={{ maxWidth: 1400, margin: '0 auto', display: 'grid', gridTemplateColumns: '420px 1fr', gap: 80, alignItems: 'center' }}>
        <div style={{ display: 'flex', justifyContent: 'center' }}>
          <BookCover title={<>You are<br/>not<br/>finished</>} subtitle="Grace, grit, and the long way home." variant="copper" w={380} h={570} rotate={-2} />
        </div>
        <div>
          <div style={{ fontFamily: T.font.mono, fontSize: 12, color: T.color.copper, letterSpacing: '.15em', marginBottom: 18 }}>[ Memoir · Spring 2026 · Hardcover ]</div>
          <h1 style={{ fontFamily: T.font.head, fontSize: 112, fontWeight: 900, lineHeight: .85, letterSpacing: '-0.05em', textTransform: 'uppercase', margin: 0 }}>
            You are not <span style={{ color: T.color.copper }}>finished.</span>
          </h1>
          <div style={{ fontFamily: T.font.quote, fontSize: 26, fontStyle: 'italic', lineHeight: 1.4, marginTop: 32, opacity: .9, maxWidth: 620 }}>
            A memoir about the unglamorous daily work of being rebuilt — by grace you didn&rsquo;t earn, a wife who stayed, and a God who keeps no receipts.
          </div>
          <div style={{ display: 'flex', gap: 14, marginTop: 40, flexWrap: 'wrap' }}>
            <Btn kind="primary" href="#">Pre-order · $26</Btn>
            <Btn kind="ghost" dark href="#read">Read chapter one</Btn>
          </div>
          <div style={{ display: 'flex', gap: 32, marginTop: 36, fontFamily: T.font.body, fontSize: 12, fontWeight: 600, letterSpacing: '.15em', textTransform: 'uppercase', opacity: .7 }}>
            <span>Amazon</span><span>Barnes &amp; Noble</span><span>Bookshop</span><span>Audible</span>
          </div>
        </div>
      </div>
    </section>
  );
}

function About() {
  return (
    <section style={{ padding: '120px 56px', background: T.color.page }}>
      <div style={{ maxWidth: 1000, margin: '0 auto' }}>
        <Eyebrow>About the book</Eyebrow>
        <div style={{ fontFamily: T.font.head, fontSize: 56, fontWeight: 900, lineHeight: .95, letterSpacing: '-0.035em', textTransform: 'uppercase', marginBottom: 48 }}>
          A book for the person in the long middle.
        </div>
        <div style={{ fontFamily: T.font.body, fontSize: 19, lineHeight: 1.8, color: T.color.ink, maxWidth: 800 }}>
          <p>There is a part of a life that does not photograph well. It is not the collapse — that part makes a good story later. It is not the comeback — that part sells books. It is the long, quiet middle, where the lights are not on and no one is watching, and where the only question is whether you will do the next small, unglamorous thing.</p>
          <p style={{ fontFamily: T.font.quote, fontStyle: 'italic', fontSize: 26, lineHeight: 1.45, borderLeft: `3px solid ${T.color.copper}`, paddingLeft: 28, margin: '48px 0', color: T.color.ink }}>
            This book is about that part. It is about grace that arrived before I was ready, and a wife who stayed when she could have left, and the kind of faith that keeps no receipts.
          </p>
          <p>It is not a recovery memoir. It is not a system. It is a record of what the body carried, and what was rebuilt in me when I was not looking. If you have been doing the next small thing for a long time and wondering whether anything is counting — this book is a letter to you. It is counting.</p>
        </div>
      </div>
    </section>
  );
}

function Contents() {
  const parts = [
    ['I', 'The Collapse', ['01 · The paycheck that set my ceiling', '02 · The room I was not in', '03 · What I lost, in order']],
    ['II', 'The Middle', ['04 · Grace before readiness', '05 · The body keeps the record', '06 · A wife who stayed', '07 · The foundation I was laying in secret']],
    ['III', 'The Return', ['08 · Counting the small things', '09 · A God who keeps no receipts', '10 · You are not finished.']],
  ];
  return (
    <section style={{ padding: '120px 56px', background: T.color.bone }}>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <Eyebrow>Contents</Eyebrow>
        <div style={{ fontFamily: T.font.head, fontSize: 56, fontWeight: 900, lineHeight: .95, letterSpacing: '-0.035em', textTransform: 'uppercase', marginBottom: 56 }}>Three parts. Ten chapters.</div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 40 }}>
          {parts.map(([n, t, ch]) => (
            <div key={n} style={{ borderTop: `3px solid ${T.color.ink}`, paddingTop: 28 }}>
              <div style={{ fontFamily: T.font.head, fontSize: 72, fontWeight: 900, lineHeight: 1, color: T.color.copper, letterSpacing: '-0.04em' }}>{n}</div>
              <div style={{ fontFamily: T.font.head, fontSize: 28, fontWeight: 800, textTransform: 'uppercase', letterSpacing: '-0.02em', margin: '8px 0 24px' }}>{t}</div>
              {ch.map(c => <div key={c} style={{ fontFamily: T.font.body, fontSize: 14, lineHeight: 1.7, color: T.color.ink, padding: '6px 0', borderBottom: `1px solid ${T.color.mist}` }}>{c}</div>)}
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function Excerpt() {
  return (
    <section id="read" style={{ padding: '120px 56px', background: T.color.page }}>
      <div style={{ maxWidth: 820, margin: '0 auto' }}>
        <Eyebrow>Chapter one · preview</Eyebrow>
        <div style={{ fontFamily: T.font.head, fontSize: 52, fontWeight: 900, lineHeight: .95, letterSpacing: '-0.035em', textTransform: 'uppercase', marginBottom: 40 }}>The paycheck that set my ceiling.</div>
        <div style={{ fontFamily: T.font.quote, fontSize: 19, lineHeight: 1.75, color: T.color.ink }}>
          <p style={{ marginTop: 0, fontSize: 26, lineHeight: 1.4, fontStyle: 'italic' }}>For a long time I believed a number on a stub was doing the math of my life.</p>
          <p>It wasn&rsquo;t cruel math. It was polite math. It was the kind of math a friendly institution does about you, on a Friday, before it goes home for the weekend. It arrived with a direct deposit and a small word in the corner that said <em>net</em>, and I let that word do a lot of work.</p>
          <p>I want to tell you something I didn&rsquo;t know then. The number was a measurement of a contract. It was not a measurement of me. I don&rsquo;t know exactly when I lost the difference between those two sentences, but I can tell you roughly where I was standing when I got it back.</p>
          <p>I was in a kitchen. The light was the color of late afternoon. There was nothing extraordinary happening. And a small, steady voice in me said, <em>Ian, the ceiling you are living under was built by strangers who did not know your name</em>.</p>
          <p style={{ opacity: .5 }}>— continues —</p>
        </div>
        <div style={{ marginTop: 48 }}><Btn kind="solid" href="#">Pre-order the full book</Btn></div>
      </div>
    </section>
  );
}

function Praise() {
  const q = [
    ['A rare voice in a crowded genre. Ian writes the middle without flinching.', '— Benediction Magazine'],
    ['Unsparing, warm, and impossibly honest. A book you will press into someone&rsquo;s hands.', '— Notional Press'],
    ['This is the quiet theology we didn&rsquo;t know we were waiting for.', '— The Weekly Review'],
  ];
  return (
    <section style={{ padding: '120px 56px', background: T.color.ink, color: T.color.page }}>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <Eyebrow color={T.color.copper}>Early praise</Eyebrow>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 40, marginTop: 40 }}>
          {q.map(([a, b]) => (
            <div key={b}>
              <div style={{ fontFamily: T.font.quote, fontStyle: 'italic', fontSize: 22, lineHeight: 1.4 }} dangerouslySetInnerHTML={{ __html: `&ldquo;${a}&rdquo;` }} />
              <div style={{ fontFamily: T.font.body, fontSize: 12, fontWeight: 700, letterSpacing: '.15em', textTransform: 'uppercase', color: T.color.copper, marginTop: 20 }}>{b}</div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<>
  <Nav active="books" />
  <Hero />
  <About />
  <Contents />
  <Excerpt />
  <Praise />
  <Footer />
</>);
</script>
</body></html>
