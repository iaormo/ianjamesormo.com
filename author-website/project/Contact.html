<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Contact — Ian James</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&family=Fraunces:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>html,body{margin:0;padding:0;background:#FAF7F2;color:#111;font-family:"Inter",-apple-system,sans-serif}*{box-sizing:border-box}a{color:inherit}input,textarea,select{font-family:inherit}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head><body><div id="root"></div>
<script src="lib/tokens.js"></script><script type="text/babel" src="lib/components.jsx"></script>
<script type="text/babel">
const T=window.IJ_TOKENS;

function input(p){return{width:'100%',padding:'16px 18px',border:`1px solid ${T.color.mist}`,background:T.color.page,fontSize:15,outline:'none',...p};}

function Contact(){
  const [reason,setReason]=React.useState('note');
  return(
    <section style={{padding:'80px 56px 120px',background:T.color.page}}>
      <div style={{maxWidth:1200,margin:'0 auto'}}>
        <Eyebrow>Contact</Eyebrow>
        <div style={{fontFamily:T.font.head,fontSize:112,fontWeight:900,lineHeight:.88,letterSpacing:'-0.05em',textTransform:'uppercase',marginBottom:24}}>
          Send a <span style={{color:T.color.copper}}>letter.</span>
        </div>
        <div style={{fontFamily:T.font.quote,fontSize:22,fontStyle:'italic',lineHeight:1.5,color:T.color.steel,maxWidth:680,marginBottom:64}}>
          I read every note. Not always quickly. Always carefully.
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1.3fr 1fr',gap:72,alignItems:'start'}}>
          <form onSubmit={e=>e.preventDefault()}>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:28}}>
              {[['note','A note'],['speak','Speaking'],['press','Press'],['other','Other']].map(([v,l])=>(
                <button key={v} type="button" onClick={()=>setReason(v)} style={{padding:'14px 8px',border:`1px solid ${reason===v?T.color.ink:T.color.mist}`,background:reason===v?T.color.ink:'transparent',color:reason===v?T.color.page:T.color.ink,fontFamily:T.font.body,fontSize:11,fontWeight:700,letterSpacing:'.14em',textTransform:'uppercase',cursor:'pointer'}}>{l}</button>
              ))}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
              <input placeholder="First name" style={input()} />
              <input placeholder="Last name" style={input()} />
            </div>
            <input placeholder="Email" style={{...input(),marginBottom:12}} />
            {reason==='speak' && <input placeholder="Event · organization · date" style={{...input(),marginBottom:12}} />}
            {reason==='press' && <input placeholder="Publication · deadline" style={{...input(),marginBottom:12}} />}
            <textarea placeholder="Write your note here…" rows={8} style={{...input(),resize:'vertical'}} />
            <div style={{marginTop:24,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div style={{fontFamily:T.font.mono,fontSize:11,color:T.color.steel,letterSpacing:'.1em'}}>We will not share your email.</div>
              <Btn kind="primary" href="#">Send →</Btn>
            </div>
          </form>

          <div style={{background:T.color.ink,color:T.color.page,padding:40}}>
            <div style={{fontFamily:T.font.body,fontSize:11,fontWeight:700,letterSpacing:'.25em',textTransform:'uppercase',color:T.color.copper,marginBottom:32}}>Direct</div>
            {[['Notes','hello@ianjames.co'],['Speaking','speaking@ianjames.co'],['Press · Interviews','press@ianjames.co'],['Bulk book orders','orders@ianjames.co']].map(([l,v])=>(
              <div key={l} style={{paddingBottom:20,marginBottom:20,borderBottom:'1px solid rgba(255,255,255,.1)'}}>
                <div style={{fontFamily:T.font.body,fontSize:11,fontWeight:600,letterSpacing:'.18em',textTransform:'uppercase',opacity:.6,marginBottom:6}}>{l}</div>
                <div style={{fontFamily:T.font.head,fontSize:18,fontWeight:700,letterSpacing:'-0.01em'}}>{v}</div>
              </div>
            ))}
            <div style={{fontFamily:T.font.quote,fontStyle:'italic',fontSize:17,lineHeight:1.55,color:'rgba(250,247,242,.8)',marginTop:24}}>
              I answer what I can. If you&rsquo;ve written and haven&rsquo;t heard — assume I read it. It counted.
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<><Nav active="contact"/><Contact/><Footer/></>);
</script>
</body></html>
