<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>About — Ian James</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&family=Fraunces:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>html,body{margin:0;padding:0;background:#FAF7F2;color:#111;font-family:"Inter",-apple-system,sans-serif}*{box-sizing:border-box}a{color:inherit}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body><div id="root"></div>
<script src="lib/tokens.js"></script>
<script type="text/babel" src="lib/components.jsx"></script>
<script type="text/babel">
const T = window.IJ_TOKENS;

function Hero() {
  return (
    <section style={{ padding: '88px 56px 72px', background: T.color.page }}>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <Eyebrow>About · The story</Eyebrow>
        <h1 style={{ fontFamily: T.font.head, fontSize: 132, fontWeight: 900, lineHeight: .86, letterSpacing: '-0.05em', textTransform: 'uppercase', margin: 0 }}>
          I was not<br/>rebuilt by <span style={{ color: T.color.copper }}>effort.</span>
        </h1>
        <div style={{ fontFamily: T.font.quote, fontSize: 26, fontStyle: 'italic', lineHeight: 1.45, color: T.color.steel, marginTop: 40, maxWidth: 760 }}>
          I was rebuilt by a grace I did not earn, a wife who stayed, and a thousand small unglamorous days I thought were not counting for anything.
        </div>
      </div>
    </section>
  );
}

function Story() {
  return (
    <section style={{ padding: '72px 56px', background: T.color.bone }}>
      <div style={{ maxWidth: 1200, margin: '0 auto', display: 'grid', gridTemplateColumns: '380px 1fr', gap: 72 }}>
        <div>
          <div style={{ aspectRatio: '3/4', background: T.color.mist, position: 'relative', marginBottom: 20 }}>
            <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <svg viewBox="0 0 200 260" style={{ width: '75%', height: '75%', opacity: .3 }}>
                <circle cx="100" cy="90" r="42" fill={T.color.steel} />
                <path d="M30 260 Q30 160 100 160 Q170 160 170 260 Z" fill={T.color.steel} />
              </svg>
            </div>
            <div style={{ position: 'absolute', bottom: 12, left: 12, fontFamily: T.font.mono, fontSize: 10, color: T.color.steel, letterSpacing: '.1em', textTransform: 'uppercase' }}>[ Author photo · placeholder ]</div>
          </div>
          <div style={{ fontFamily: T.font.mono, fontSize: 11, color: T.color.steel, letterSpacing: '.1em' }}>IAN JAMES · B. 1983 · WRITES FROM HOME</div>
        </div>
        <div style={{ fontFamily: T.font.body, fontSize: 18, lineHeight: 1.8, color: T.color.ink, maxWidth: 640 }}>
          <p style={{ marginTop: 0, fontFamily: T.font.quote, fontSize: 28, lineHeight: 1.4, fontStyle: 'italic' }}>
            I write for the person in the middle — not the collapse, not the comeback. The long quiet part in between.
          </p>
          <p>Before I wrote, I worked — and I let a paycheck assess me. I measured the size of my life by the size of the number on the stub, and I let an institution&rsquo;s math set my ceiling. It took me years to notice that was happening, and longer to disagree with it out loud.</p>
          <p>Then I lost things. Not tidy losses — the kind that take the shape of your body. In the middle of that, I started writing again. Not to perform, not to teach — just to hold what was happening until I could say it without flinching.</p>
          <p style={{ fontFamily: T.font.quote, fontSize: 22, lineHeight: 1.55, borderLeft: `3px solid ${T.color.copper}`, paddingLeft: 22, margin: '36px 0', color: T.color.ink, fontStyle: 'italic' }}>
            The books came from there. They are for the person who has started to suspect that the small, unglamorous thing they did today was the foundation.
          </p>
          <p>I write self-help, business, and non-fiction the way I read them — slowly, and with a distrust of cleanliness. I write faith and devotional the way I live them — early, in pen, and before I am sure of the ending. I am a teacher and a storyteller. Sometimes a pastor to one person at a time.</p>
          <p>If you are in the middle — still here, still showing up, still doing the next small thing — the writing on this site is for you.</p>
        </div>
      </div>
    </section>
  );
}

function Stats() {
  const stats = [
    ['9,400+', 'Readers of the weekly letter'],
    ['2', 'Books in print'],
    ['047', 'Daily devotionals published'],
    ['14 yrs', 'Marriage · still showing up'],
  ];
  return (
    <section style={{ padding: '96px 56px', background: T.color.ink, color: T.color.page }}>
      <div style={{ maxWidth: 1200, margin: '0 auto', display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 1, background: 'rgba(255,255,255,.08)' }}>
        {stats.map(([n, l]) => (
          <div key={l} style={{ background: T.color.ink, padding: '40px 24px' }}>
            <div style={{ fontFamily: T.font.head, fontSize: 64, fontWeight: 900, lineHeight: 1, letterSpacing: '-0.04em', color: T.color.copper, marginBottom: 16 }}>{n}</div>
            <div style={{ fontFamily: T.font.body, fontSize: 13, fontWeight: 600, letterSpacing: '.12em', textTransform: 'uppercase', opacity: .85 }}>{l}</div>
          </div>
        ))}
      </div>
    </section>
  );
}

function Press() {
  const quotes = [
    ['A rare voice in a crowded room.', '— Notional Press'],
    ['Unsparing, warm, and impossibly honest.', '— The Weekly Review'],
    ['The quiet theology we didn&rsquo;t know we were waiting for.', '— Benediction Magazine'],
  ];
  return (
    <section style={{ padding: '120px 56px', background: T.color.page }}>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <Eyebrow>Press · Media</Eyebrow>
        <div style={{ fontFamily: T.font.head, fontSize: 64, fontWeight: 900, lineHeight: .92, letterSpacing: '-0.04em', textTransform: 'uppercase', marginBottom: 64 }}>What others have said.</div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 40 }}>
          {quotes.map(([q, a]) => (
            <div key={a} style={{ borderTop: `3px solid ${T.color.copper}`, paddingTop: 28 }}>
              <div style={{ fontFamily: T.font.quote, fontStyle: 'italic', fontSize: 24, lineHeight: 1.35, color: T.color.ink }} dangerouslySetInnerHTML={{ __html: `&ldquo;${q}&rdquo;` }} />
              <div style={{ fontFamily: T.font.body, fontSize: 12, fontWeight: 700, letterSpacing: '.15em', textTransform: 'uppercase', color: T.color.steel, marginTop: 20 }}>{a}</div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function Footer2() { return <Footer />; }

ReactDOM.createRoot(document.getElementById('root')).render(<>
  <Nav active="about" />
  <Hero />
  <Story />
  <Stats />
  <Press />
  <Footer />
</>);
</script>
</body></html>
