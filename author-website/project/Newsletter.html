<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Newsletter — Ian James</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&family=Fraunces:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>html,body{margin:0;padding:0;background:#FAF7F2;color:#111;font-family:"Inter",-apple-system,sans-serif}*{box-sizing:border-box}a{color:inherit}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head><body><div id="root"></div>
<script src="lib/tokens.js"></script><script type="text/babel" src="lib/components.jsx"></script>
<script type="text/babel">
const T=window.IJ_TOKENS;

function Hero(){return(
  <section style={{background:T.color.copper,color:T.color.page,padding:'120px 56px',position:'relative',overflow:'hidden'}}>
    <div style={{position:'absolute',top:-60,right:-40,fontFamily:T.font.head,fontSize:480,fontWeight:900,lineHeight:.8,color:T.color.ink,opacity:.09,letterSpacing:'-0.06em'}}>IJ</div>
    <div style={{maxWidth:1100,margin:'0 auto',position:'relative'}}>
      <Eyebrow color={T.color.ink}>The letter</Eyebrow>
      <div style={{fontFamily:T.font.head,fontSize:144,fontWeight:900,lineHeight:.86,letterSpacing:'-0.05em',textTransform:'uppercase'}}>
        Sunday.<br/>A quiet letter.<br/>Nothing to sell.
      </div>
      <div style={{fontFamily:T.font.quote,fontSize:26,fontStyle:'italic',lineHeight:1.45,marginTop:40,maxWidth:720}}>
        A passage, a paragraph, a question. No growth hacks. No seven steps. Just the next small honest thing for the week ahead.
      </div>
      <form onSubmit={e=>e.preventDefault()} style={{display:'flex',maxWidth:600,marginTop:48,background:T.color.page}}>
        <input type="email" placeholder="you@email.com" style={{flex:1,border:'none',padding:'22px 24px',fontFamily:T.font.body,fontSize:16,color:T.color.ink,outline:'none',background:'transparent'}}/>
        <button style={{background:T.color.ink,color:T.color.page,border:'none',padding:'0 36px',fontFamily:T.font.body,fontSize:12,fontWeight:700,letterSpacing:'.18em',textTransform:'uppercase',cursor:'pointer'}}>Subscribe →</button>
      </form>
      <div style={{fontFamily:T.font.body,fontSize:12,marginTop:18,opacity:.8,letterSpacing:'.1em',textTransform:'uppercase'}}>9,400+ readers · One email a week · Unsubscribe anytime</div>
    </div>
  </section>
);}

function Inside(){const items=[
  ['A passage','One piece of Scripture or a sentence I can&rsquo;t stop thinking about.'],
  ['A paragraph','A short reflection — five to eight sentences. Not a sermon.'],
  ['A question','One question to carry into your week. You don&rsquo;t have to answer it today.'],
  ['A next step','One small unglamorous thing to do, if you want. Usually free. Usually under five minutes.'],
];return(
  <section style={{padding:'120px 56px',background:T.color.page}}>
    <div style={{maxWidth:1200,margin:'0 auto'}}>
      <Eyebrow>Inside every letter</Eyebrow>
      <div style={{fontFamily:T.font.head,fontSize:64,fontWeight:900,lineHeight:.95,letterSpacing:'-0.04em',textTransform:'uppercase',marginBottom:56}}>Four small parts.</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:1,background:T.color.mist,border:`1px solid ${T.color.mist}`}}>
        {items.map(([t,d],i)=>(
          <div key={t} style={{background:T.color.page,padding:'36px 28px',minHeight:260}}>
            <div style={{fontFamily:T.font.mono,fontSize:12,color:T.color.copper,marginBottom:16,letterSpacing:'.08em'}}>0{i+1} /04</div>
            <div style={{fontFamily:T.font.head,fontSize:24,fontWeight:800,letterSpacing:'-0.02em',marginBottom:12}}>{t}</div>
            <div style={{fontFamily:T.font.body,fontSize:14,lineHeight:1.6,color:T.color.steel}} dangerouslySetInnerHTML={{__html:d}}/>
          </div>
        ))}
      </div>
    </div>
  </section>
);}

function Readers(){return(
  <section style={{padding:'120px 56px',background:T.color.ink,color:T.color.page}}>
    <div style={{maxWidth:1100,margin:'0 auto'}}>
      <Eyebrow color={T.color.copper}>Readers</Eyebrow>
      <div style={{fontFamily:T.font.quote,fontSize:44,fontStyle:'italic',lineHeight:1.3,maxWidth:900,marginTop:32}}>
        &ldquo;Ian&rsquo;s letter is the one email I don&rsquo;t archive on Sunday. I leave it open in a tab all week.&rdquo;
      </div>
      <div style={{fontFamily:T.font.body,fontSize:12,fontWeight:700,letterSpacing:'.2em',textTransform:'uppercase',color:T.color.copper,marginTop:24}}>— A. M., Austin</div>
    </div>
  </section>
);}

ReactDOM.createRoot(document.getElementById('root')).render(<><Nav active="home"/><Hero/><Inside/><Readers/><Footer/></>);
</script>
</body></html>
