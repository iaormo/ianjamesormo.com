<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Books — Ian James</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&family=Fraunces:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>html,body{margin:0;padding:0;background:#FAF7F2;color:#111;font-family:"Inter",-apple-system,sans-serif}*{box-sizing:border-box}a{color:inherit}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head><body><div id="root"></div>
<script src="lib/tokens.js"></script><script type="text/babel" src="lib/components.jsx"></script>
<script type="text/babel">
const T = window.IJ_TOKENS;
const books = [
  { id: 'finished', title: 'You are not finished', sub: 'Grace, grit, and the long way home.', cat: 'Memoir · 2026', variant: 'ink', desc: 'A memoir about a man who lost everything and was rebuilt through grace he did not earn, a wife who remained, and the daily unglamorous work of becoming.', href: 'Book-You-Are-Not-Finished.html' },
  { id: 'paycheck', title: 'You are not your paycheck', sub: 'Stop letting a number set your ceiling.', cat: 'Self-help · Business · 2025', variant: 'copper', desc: 'Why the number on your last paycheck is still setting your ceiling, and how to stop letting an institution\u2019s assessment of your worth run your life.', href: '#' },
  { id: 'presence', title: 'The room you are in', sub: 'On presence, attention, and showing up.', cat: 'Essays · Forthcoming', variant: 'page', desc: 'A collection of essays on the difference between being in the room and actually being in the room.', href: '#' },
  { id: 'carried', title: 'What the body carried', sub: 'Devotionals for the long middle.', cat: 'Devotional · Forthcoming', variant: 'bone', desc: 'Ninety short readings for the person rebuilding without a blueprint.', href: '#' },
];

function Hero() {
  return (
    <section style={{ padding: '88px 56px 64px', background: T.color.page }}>
      <div style={{ maxWidth: 1400, margin: '0 auto' }}>
        <Eyebrow>The books</Eyebrow>
        <div style={{ fontFamily: T.font.head, fontSize: 144, fontWeight: 900, lineHeight: .86, letterSpacing: '-0.05em', textTransform: 'uppercase' }}>
          Four books.<br/>One <span style={{ color: T.color.copper }}>question.</span>
        </div>
        <div style={{ fontFamily: T.font.quote, fontSize: 24, fontStyle: 'italic', marginTop: 32, maxWidth: 720, color: T.color.steel, lineHeight: 1.45 }}>
          What does it cost to keep showing up — and is anyone counting the small things?
        </div>
      </div>
    </section>
  );
}

function Grid() {
  return (
    <section style={{ padding: '40px 56px 120px', background: T.color.page }}>
      <div style={{ maxWidth: 1400, margin: '0 auto' }}>
        {books.map((b, i) => (
          <a key={b.id} href={b.href} style={{ display: 'grid', gridTemplateColumns: '380px 1fr 120px', gap: 64, alignItems: 'center', padding: '64px 0', borderTop: `1px solid ${T.color.mist}`, borderBottom: i === books.length - 1 ? `1px solid ${T.color.mist}` : 'none', textDecoration: 'none', color: T.color.ink }}>
            <div style={{ display: 'flex', justifyContent: 'center' }}>
              <BookCover title={b.title} subtitle={b.sub} variant={b.variant} w={260} h={390} rotate={i % 2 === 0 ? -1.5 : 1.5} />
            </div>
            <div>
              <div style={{ fontFamily: T.font.mono, fontSize: 12, color: T.color.copper, marginBottom: 16, letterSpacing: '.1em' }}>[ {b.cat} ]</div>
              <div style={{ fontFamily: T.font.head, fontSize: 56, fontWeight: 900, lineHeight: .9, letterSpacing: '-0.04em', textTransform: 'uppercase', marginBottom: 20 }}>{b.title}.</div>
              <div style={{ fontFamily: T.font.quote, fontStyle: 'italic', fontSize: 22, lineHeight: 1.45, color: T.color.steel, marginBottom: 20, maxWidth: 600 }}>{b.sub}</div>
              <div style={{ fontFamily: T.font.body, fontSize: 16, lineHeight: 1.65, color: T.color.ink, maxWidth: 600 }}>{b.desc}</div>
            </div>
            <div style={{ textAlign: 'right', fontFamily: T.font.body, fontSize: 36, color: T.color.copper }}>→</div>
          </a>
        ))}
      </div>
    </section>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<>
  <Nav active="books" />
  <Hero />
  <Grid />
  <Footer />
</>);
</script>
</body></html>
