<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Daily — Ian James</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&family=Fraunces:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>html,body{margin:0;padding:0;background:#FAF7F2;color:#111;font-family:"Inter",-apple-system,sans-serif}*{box-sizing:border-box}a{color:inherit}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head><body><div id="root"></div>
<script src="lib/tokens.js"></script><script type="text/babel" src="lib/components.jsx"></script>
<script type="text/babel">
const T = window.IJ_TOKENS;

const archive = [
  ['047', 'April 21', 'The quiet rebuild', 'Proverbs 4:23'],
  ['046', 'April 20', 'Grace before readiness', 'Romans 5:8'],
  ['045', 'April 19', 'What the body carried', 'Psalm 139:14'],
  ['044', 'April 18', 'Not resilience — faithfulness', 'Galatians 6:9'],
  ['043', 'April 17', 'The room you are in', '1 Peter 3:7'],
  ['042', 'April 16', 'Cost as evidence', 'John 15:13'],
];

function Today() {
  return (
    <section style={{ padding: '80px 56px 48px', background: T.color.page }}>
      <div style={{ maxWidth: 1400, margin: '0 auto' }}>
        <Eyebrow>Daily devotionals</Eyebrow>
        <div style={{ fontFamily: T.font.head, fontSize: 120, fontWeight: 900, lineHeight: .86, letterSpacing: '-0.05em', textTransform: 'uppercase' }}>
          Three minutes.<br/>Every <span style={{ color: T.color.copper }}>morning.</span>
        </div>
        <div style={{ fontFamily: T.font.quote, fontSize: 22, fontStyle: 'italic', marginTop: 28, maxWidth: 720, color: T.color.steel, lineHeight: 1.5 }}>
          Short, honest readings for people who have tried the <em>conquer your day</em> stuff and are looking for something truer, slower, and harder to fake.
        </div>
      </div>
    </section>
  );
}

function Featured() {
  return (
    <section style={{ padding: '40px 56px 72px', background: T.color.page }}>
      <div style={{ maxWidth: 1400, margin: '0 auto' }}>
        <div style={{ background: T.color.ink, color: T.color.page, padding: 72, position: 'relative', minHeight: 540 }}>
          <div style={{ position: 'absolute', top: 32, left: 32, right: 32, display: 'flex', justifyContent: 'space-between', fontFamily: T.font.mono, fontSize: 11, letterSpacing: '.18em', textTransform: 'uppercase', color: T.color.copper }}>
            <span>Day 047 · Today</span><span>Proverbs 4:23</span>
          </div>
          <div style={{ maxWidth: 960, margin: '60px auto 0' }}>
            <div style={{ fontFamily: T.font.quote, fontSize: 68, fontStyle: 'italic', lineHeight: 1.05, letterSpacing: '-0.015em' }}>
              &ldquo;Grace doesn&rsquo;t wait for your readiness. It arrives before you&rsquo;ve cleaned up.&rdquo;
            </div>
            <div style={{ fontFamily: T.font.body, fontSize: 17, lineHeight: 1.75, marginTop: 40, color: 'rgba(250,247,242,.85)' }}>
              This is the quiet theology of the rebuild. You do not earn your way back into the room. You are carried in, and then you are asked to stay. Today, do the small, unglamorous thing. Count it. Go again tomorrow. The foundation is being laid whether you see it or not.
            </div>
            <div style={{ borderTop: '1px solid rgba(255,255,255,.2)', marginTop: 48, paddingTop: 24, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <div style={{ fontFamily: T.font.body, fontSize: 12, fontWeight: 700, letterSpacing: '.18em', textTransform: 'uppercase', color: T.color.copper }}>— Ian</div>
              <div style={{ display: 'flex', gap: 20, fontFamily: T.font.body, fontSize: 12, fontWeight: 600, letterSpacing: '.15em', textTransform: 'uppercase', opacity: .75 }}>
                <a href="#" style={{ color: T.color.page, textDecoration: 'none' }}>Share</a>
                <a href="#" style={{ color: T.color.page, textDecoration: 'none' }}>Save</a>
                <a href="Newsletter.html" style={{ color: T.color.copper, textDecoration: 'none' }}>Get by email →</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

function Archive() {
  return (
    <section style={{ padding: '72px 56px 120px', background: T.color.page }}>
      <div style={{ maxWidth: 1400, margin: '0 auto' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 40 }}>
          <div style={{ fontFamily: T.font.head, fontSize: 48, fontWeight: 900, lineHeight: .95, letterSpacing: '-0.035em', textTransform: 'uppercase' }}>Archive</div>
          <a href="#" style={{ fontFamily: T.font.body, fontSize: 12, fontWeight: 700, letterSpacing: '.18em', textTransform: 'uppercase', color: T.color.copper, textDecoration: 'none' }}>All 47 readings →</a>
        </div>
        {archive.map((r, i) => (
          <a key={r[0]} href="#" style={{ display: 'grid', gridTemplateColumns: '80px 120px 1fr 200px 60px', alignItems: 'center', gap: 32, padding: '28px 0', borderTop: `1px solid ${T.color.mist}`, borderBottom: i === archive.length - 1 ? `1px solid ${T.color.mist}` : 'none', textDecoration: 'none', color: T.color.ink }}>
            <div style={{ fontFamily: T.font.mono, fontSize: 12, color: T.color.copper, letterSpacing: '.1em' }}>Day {r[0]}</div>
            <div style={{ fontFamily: T.font.mono, fontSize: 12, color: T.color.steel, letterSpacing: '.05em' }}>{r[1]}</div>
            <div style={{ fontFamily: T.font.head, fontSize: 26, fontWeight: 800, lineHeight: 1.1, letterSpacing: '-0.02em' }}>{r[2]}</div>
            <div style={{ fontFamily: T.font.body, fontSize: 13, color: T.color.steel, fontStyle: 'italic' }}>{r[3]}</div>
            <div style={{ textAlign: 'right', fontFamily: T.font.body, fontSize: 20, color: T.color.copper }}>→</div>
          </a>
        ))}
      </div>
    </section>
  );
}

function Subscribe() {
  return (
    <section style={{ padding: '120px 56px', background: T.color.copper, color: T.color.page }}>
      <div style={{ maxWidth: 900, margin: '0 auto', textAlign: 'center' }}>
        <div style={{ fontFamily: T.font.head, fontSize: 80, fontWeight: 900, lineHeight: .9, letterSpacing: '-0.045em', textTransform: 'uppercase', marginBottom: 28 }}>
          Get it in your inbox.
        </div>
        <div style={{ fontFamily: T.font.quote, fontSize: 20, fontStyle: 'italic', lineHeight: 1.5, marginBottom: 40, opacity: .95 }}>
          One reading, one question. Every weekday morning. 3 minutes or less.
        </div>
        <form onSubmit={(e) => e.preventDefault()} style={{ display: 'flex', maxWidth: 540, margin: '0 auto', background: T.color.page }}>
          <input type="email" placeholder="you@email.com" style={{ flex: 1, border: 'none', padding: '18px 22px', fontFamily: T.font.body, fontSize: 15, color: T.color.ink, outline: 'none', background: 'transparent' }} />
          <button style={{ background: T.color.ink, color: T.color.page, border: 'none', padding: '0 28px', fontFamily: T.font.body, fontSize: 12, fontWeight: 700, letterSpacing: '.15em', textTransform: 'uppercase', cursor: 'pointer' }}>Subscribe</button>
        </form>
      </div>
    </section>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<>
  <Nav active="daily" />
  <Today />
  <Featured />
  <Archive />
  <Subscribe />
  <Footer />
</>);
</script>
</body></html>
