<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Essays — Ian James</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&family=Fraunces:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>html,body{margin:0;padding:0;background:#FAF7F2;color:#111;font-family:"Inter",-apple-system,sans-serif}*{box-sizing:border-box}a{color:inherit}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head><body><div id="root"></div>
<script src="lib/tokens.js"></script><script type="text/babel" src="lib/components.jsx"></script>
<script type="text/babel">
const T = window.IJ_TOKENS;
const essays = [
  ['014','Apr 18 · 2026','The room you are already in.','On presence, attention, and the marriage I was not actually showing up to.','6 min','Presence'],
  ['013','Apr 11 · 2026','A letter to the man rebuilding.','The foundations you are laying in secret are being counted.','8 min','Grace'],
  ['012','Apr 04 · 2026','Worth and the paycheck ceiling.','How a number on a stub quietly trained you to stay small.','11 min','Work'],
  ['011','Mar 28 · 2026','The body as witness.','What it carried, and why I trust it more than what I understood.','7 min','Body'],
  ['010','Mar 21 · 2026','Faithfulness is not resilience.','It is quieter. It is not about bouncing back. It is about not leaving.','5 min','Faith'],
  ['009','Mar 14 · 2026','On wives who stay.','A short essay about a long sentence.','4 min','Marriage'],
  ['008','Mar 07 · 2026','Cost as proof.','Love and faith are not feelings. They are what they cost.','9 min','Grace'],
  ['007','Feb 28 · 2026','The man you were in the kitchen.','A late afternoon. Nothing extraordinary happening.','6 min','Memoir'],
];
const tags = ['All','Presence','Grace','Work','Body','Faith','Marriage','Memoir'];

function Hero(){return(
  <section style={{padding:'80px 56px 40px',background:T.color.page}}>
    <div style={{maxWidth:1400,margin:'0 auto'}}>
      <Eyebrow>Essays</Eyebrow>
      <div style={{fontFamily:T.font.head,fontSize:144,fontWeight:900,lineHeight:.86,letterSpacing:'-0.05em',textTransform:'uppercase'}}>
        Longer than a post.<br/>Shorter <span style={{color:T.color.copper}}>than a book.</span>
      </div>
    </div>
  </section>
);}

function Filter(){return(
  <section style={{padding:'24px 56px',background:T.color.page,borderTop:`1px solid ${T.color.mist}`,borderBottom:`1px solid ${T.color.mist}`}}>
    <div style={{maxWidth:1400,margin:'0 auto',display:'flex',gap:8,flexWrap:'wrap'}}>
      {tags.map((t,i)=>(
        <button key={t} style={{border:'none',background:i===0?T.color.ink:'transparent',color:i===0?T.color.page:T.color.ink,padding:'10px 18px',fontFamily:T.font.body,fontSize:11,fontWeight:700,letterSpacing:'.18em',textTransform:'uppercase',cursor:'pointer'}}>{t}</button>
      ))}
    </div>
  </section>
);}

function Featured(){const e=essays[0];return(
  <section style={{padding:'72px 56px',background:T.color.bone}}>
    <div style={{maxWidth:1400,margin:'0 auto',display:'grid',gridTemplateColumns:'1fr 1fr',gap:72,alignItems:'center'}}>
      <div style={{aspectRatio:'4/3',background:T.color.ink,color:T.color.page,padding:48,display:'flex',flexDirection:'column',justifyContent:'space-between'}}>
        <div style={{fontFamily:T.font.mono,fontSize:11,color:T.color.copper,letterSpacing:'.2em'}}>[ FEATURED · NO. {e[0]} ]</div>
        <div style={{fontFamily:T.font.quote,fontStyle:'italic',fontSize:40,lineHeight:1.15}}>&ldquo;The room has been there. You just haven&rsquo;t been in it.&rdquo;</div>
        <div style={{fontFamily:T.font.body,fontSize:12,fontWeight:600,letterSpacing:'.15em',textTransform:'uppercase',opacity:.6}}>— Pull quote</div>
      </div>
      <div>
        <div style={{fontFamily:T.font.mono,fontSize:12,color:T.color.copper,marginBottom:16,letterSpacing:'.12em'}}>[ {e[5]} · {e[1]} · {e[4]} ]</div>
        <div style={{fontFamily:T.font.head,fontSize:64,fontWeight:900,lineHeight:.92,letterSpacing:'-0.04em',textTransform:'uppercase',marginBottom:28}}>{e[2]}</div>
        <div style={{fontFamily:T.font.quote,fontStyle:'italic',fontSize:22,lineHeight:1.5,color:T.color.steel,marginBottom:32,maxWidth:540}}>{e[3]}</div>
        <Btn kind="solid" href="#">Read the essay</Btn>
      </div>
    </div>
  </section>
);}

function List(){return(
  <section style={{padding:'80px 56px 120px',background:T.color.page}}>
    <div style={{maxWidth:1400,margin:'0 auto'}}>
      {essays.slice(1).map((r,i)=>(
        <a key={r[0]} href="#" style={{display:'grid',gridTemplateColumns:'80px 140px 1fr 140px 100px 60px',gap:32,alignItems:'center',padding:'32px 0',borderTop:`1px solid ${T.color.mist}`,borderBottom:i===essays.length-2?`1px solid ${T.color.mist}`:'none',textDecoration:'none',color:T.color.ink}}>
          <div style={{fontFamily:T.font.mono,fontSize:12,color:T.color.copper,letterSpacing:'.1em'}}>No. {r[0]}</div>
          <div style={{fontFamily:T.font.mono,fontSize:12,color:T.color.steel}}>{r[1]}</div>
          <div>
            <div style={{fontFamily:T.font.head,fontSize:30,fontWeight:800,lineHeight:1.1,letterSpacing:'-0.02em',marginBottom:8}}>{r[2]}</div>
            <div style={{fontFamily:T.font.body,fontSize:14,color:T.color.steel,lineHeight:1.5}}>{r[3]}</div>
          </div>
          <div style={{fontFamily:T.font.body,fontSize:11,fontWeight:700,letterSpacing:'.15em',textTransform:'uppercase',color:T.color.copper}}>{r[5]}</div>
          <div style={{fontFamily:T.font.body,fontSize:12,fontWeight:600,letterSpacing:'.12em',textTransform:'uppercase',color:T.color.steel,textAlign:'right'}}>{r[4]}</div>
          <div style={{textAlign:'right',fontFamily:T.font.body,fontSize:20,color:T.color.copper}}>→</div>
        </a>
      ))}
    </div>
  </section>
);}

ReactDOM.createRoot(document.getElementById('root')).render(<><Nav active="essays"/><Hero/><Filter/><Featured/><List/><Footer/></>);
</script>
</body></html>
