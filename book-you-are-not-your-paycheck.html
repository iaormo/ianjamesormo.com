function BookCover({ title, subtitle, variant = 'copper', w = 280, h = 420, rotate = 0 }) {
  const palettes = {
    ink:    { bg: T.color.ink,    fg: T.color.page, accent: T.color.copper, spine: '#000' },
    copper: { bg: T.color.copper, fg: T.color.page, accent: T.color.ink,    spine: '#7a2f12' },
  };
  const p = palettes[variant] || palettes.copper;
  return (
    <div style={{
      width: w, height: h, background: p.bg, color: p.fg, position: 'relative',
      boxShadow: `0 0 0 1px rgba(0,0,0,.05), 40px 55px 110px -30px rgba(0,0,0,.55), 14px 22px 44px -10px rgba(0,0,0,.32), inset 10px 0 14px -10px rgba(0,0,0,.45), inset -2px 0 0 rgba(255,255,255,.06)`,
      transform: `perspective(1600px) rotateY(-7deg) rotate(${rotate}deg)`,
      transformOrigin: 'center',
      flexShrink: 0,
      borderRadius: '2px 3px 3px 2px',
    }}>
      <div style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: 6, background: `linear-gradient(90deg, ${p.spine} 0%, rgba(0,0,0,.25) 40%, transparent 100%)`, pointerEvents: 'none' }} />
      <div style={{ position: 'absolute', inset: 0, padding: '9%', display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
        <div>
          <div style={{ fontFamily: T.font.head, fontSize: w * .13, fontWeight: 900, lineHeight: .95, letterSpacing: '-0.035em', textTransform: 'uppercase' }}>{title}</div>
          <div style={{ width: w * .22, height: 4, background: p.accent, margin: `${w * .04}px 0` }} />
          {subtitle && <div style={{ fontFamily: T.font.body, fontSize: w * .045, fontWeight: 500, lineHeight: 1.35, opacity: .88 }}>{subtitle}</div>}
        </div>
      </div>
      <div style={{ position: 'absolute', bottom: '9%', left: '9%', fontFamily: T.font.body, fontSize: w * .028, fontWeight: 700, letterSpacing: '.2em', textTransform: 'uppercase', opacity: .55, color: p.fg }}>Ian James Ormo</div>
    </div>
  );
}

function Btn({ children, kind = 'primary', href, dark }) {

    ghost:   { background: 'transparent', color: dark ? T.color.page : T.color.ink, border: `2px solid ${dark ? 'rgba(255,255,255,.35)' : T.color.ink}` },
    solid:   { background: T.color.copper, color: T.color.page, border: `2px solid ${T.color.copper}` },
  };
  return <a href={href} style={{ ...styles[kind], textDecoration: 'none', padding: '16px 30px', display: 'inline-flex', alignItems: 'center', gap: 10, fontFamily: T.font.body, fontSize: 12, fontWeight: 700, letterSpacing: '.18em', textTransform: 'uppercase' }}>{children}</a>;
}

function Eyebrow({ children, color }) {
  return <div style={{ fontFamily: T.font.body, fontSize: 11, fontWeight: 700, letterSpacing: '.3em', textTransform: 'uppercase', color: color || T.color.copper, marginBottom: 20 }}>{children}</div>;
}

const NOT = <span style={{fontFamily:T.font.quote,fontStyle:'italic',fontWeight:400,letterSpacing:'0em',textTransform:'none',fontSize:'1.4em',lineHeight:.8}}>not</span>;

function Hero() {
  return (
    <section className="section-pad" style={{ background: T.color.copper, color: T.color.page, padding: '80px 56px 120px' }}>
      <div style={{ maxWidth: 1400, margin: '0 auto' }}>
        <div className="hero-grid" style={{ display: 'grid', gridTemplateColumns: '400px 1fr', gap: 80, alignItems: 'center' }}>
          <div style={{ display: 'flex', justifyContent: 'center' }}>
            <BookCover
              title={<>You are<br />{NOT}<br />your<br />paycheck</>}
              subtitle="Stop letting a number set your ceiling."
              variant="ink"
              w={360} h={540} rotate={2}
            />
          </div>
          <div>
            <div style={{ fontFamily: T.font.mono, fontSize: 12, color: T.color.ink, letterSpacing: '.15em', marginBottom: 18 }}>[ Self-help · Business · Coming soon ]</div>
            <h1 className="hero-h" style={{ fontFamily: T.font.head, fontSize: 112, fontWeight: 900, lineHeight: .9, letterSpacing: '-0.05em', textTransform: 'uppercase', margin: '0 0 32px' }}>
              You are {NOT} <span style={{ color: T.color.ink }}>your paycheck.</span>
            </h1>
            <div style={{ fontFamily: T.font.quote, fontSize: 24, fontStyle: 'italic', lineHeight: 1.4, opacity: .95, maxWidth: 580, marginBottom: 40 }}>
              The honest guide to leaving your job without burning everything down. A book about arithmetic, runway, and the one honest conversation you have been avoiding.
            </div>
            <div style={{ display: 'flex', gap: 14, flexWrap: 'wrap', marginBottom: 36 }}>
              <Btn kind="primary" href="#">Pre-order →</Btn>
              <Btn kind="ghost" dark href="#excerpt">Read the opening</Btn>

}

function AboutBook() {
  return (
    <section className="section-pad" style={{ padding: '120px 56px', background: T.color.page }}>
      <div style={{ maxWidth: 960, margin: '0 auto' }}>
        <Eyebrow>About the book</Eyebrow>
        <div style={{ fontFamily: T.font.head, fontSize: 52, fontWeight: 900, lineHeight: .95, letterSpacing: '-0.035em', textTransform: 'uppercase', marginBottom: 48 }}>
          A book about the number<br />you never questioned.
        </div>
        <div style={{ fontFamily: T.font.body, fontSize: 19, lineHeight: 1.8, color: T.color.ink }}>
          <p style={{ marginTop: 0 }}>There is a number most salaried people carry quietly. It is the last paycheck, or the highest one, or the one a boss dropped in a meeting and called you lucky for. That number, whether you meant to or not, became the ceiling of what you thought you were worth. Every decision after that was made under it.</p>
          <p style={{ fontFamily: T.font.quote, fontStyle: 'italic', fontSize: 26, lineHeight: 1.45, borderLeft: `3px solid ${T.color.copper}`, paddingLeft: 28, margin: '48px 0', color: T.color.ink }}>
            This is a book about that number. How it was set. How it stayed. And how to stop letting someone else&rsquo;s math become the math of your life.
          </p>
          <p>It is not a motivation book. It is not a passion book. There is no promise about following your bliss, and no chapter where you quit on a Tuesday and everything works out by Friday. It is a book about arithmetic. About runway. About the conversation with your spouse that you have been postponing. About the small, unglamorous, deeply ordinary planning that actually precedes a real transition.</p>
          <p>I have been freelancing for nearly a decade now. I left the salary world at a moment when the numbers did not add up, and I have watched myself and dozens of others navigate the same crossing. The pattern is consistent. The ones who make it are not the boldest. They are the ones who faced the number honestly, did the math on paper, and then did the next small thing for long enough that the next small thing became a living.</p>
          <p>If you are standing at a version of that crossing and every book you have read has sold you on a vibe instead of a plan, this one is for you.</p>
        </div>
      </div>
    </section>
  );
}

    ]],

      'Ch 11 · The Quiet Permission You Stop Needing',
    ]],

  ];
  return (
    <section className="section-pad" style={{ padding: '120px 56px', background: T.color.bone }}>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <Eyebrow>Contents</Eyebrow>
        <div style={{ fontFamily: T.font.head, fontSize: 56, fontWeight: 900, lineHeight: .95, letterSpacing: '-0.035em', textTransform: 'uppercase', marginBottom: 56 }}>Four parts. Thirteen chapters.</div>
        <div className="contents-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 32 }}>
          {parts.map(([n, t, ch]) => (
            <div key={n} style={{ borderTop: `3px solid ${T.color.ink}`, paddingTop: 28 }}>
              <div style={{ fontFamily: T.font.head, fontSize: 64, fontWeight: 900, lineHeight: 1, color: T.color.copper, letterSpacing: '-0.04em' }}>{n}</div>
              <div style={{ fontFamily: T.font.head, fontSize: 22, fontWeight: 800, textTransform: 'uppercase', letterSpacing: '-0.02em', margin: '8px 0 24px' }}>{t}</div>
              {ch.map(c => <div key={c} style={{ fontFamily: T.font.body, fontSize: 13, lineHeight: 1.7, color: T.color.ink, padding: '6px 0', borderBottom: `1px solid ${T.color.mist}` }}>{c}</div>)}

function Excerpt() {
  return (
    <section id="excerpt" className="section-pad" style={{ padding: '120px 56px', background: T.color.page }}>
      <div style={{ maxWidth: 760, margin: '0 auto' }}>
        <Eyebrow>The opening · Preface</Eyebrow>
        <div style={{ fontFamily: T.font.head, fontSize: 40, fontWeight: 900, lineHeight: .95, letterSpacing: '-0.035em', textTransform: 'uppercase', marginBottom: 48 }}>The ceiling you did not build.</div>
        <div style={{ fontFamily: T.font.quote, fontSize: 20, lineHeight: 1.8, color: T.color.ink }}>
          <p style={{ marginTop: 0, fontSize: 24, lineHeight: 1.5, fontStyle: 'italic' }}>There is a number in your head. You did not choose it. You did not negotiate it. It arrived, one day, on a stub with a company logo, and it quietly became the shape of how much you thought you were worth.</p>
          <p>I carried mine for years. Mine started at eighteen in a call center in Bacolod, where I got my first job with no diploma and a hunger I did not yet know was an advantage. The first number on my stub was small. It was also, for me at that moment, enormous. It represented the leap from zero to something. I was grateful for it. I remembered it the way other people remember first loves.</p>
          <p>What I did not know was that the number was installing itself. Every future number was being measured against that first one. Every promotion was evaluated by how much bigger it was than the last. Every client rate I would later charge, after I left the salary world, was unconsciously benchmarked against the highest paycheck I had ever received from someone else.</p>
          <p style={{ fontFamily: T.font.quote, fontStyle: 'italic', fontSize: 24, lineHeight: 1.4, borderLeft: `3px solid ${T.color.copper}`, paddingLeft: 28, margin: '40px 0', color: T.color.ink }}>
            The number was not a measurement. It was a transaction that ended, and then kept whispering.
          </p>
          <p>This book is an attempt to turn down the volume on that whisper. Not with affirmations. Not with a seven-step framework. With arithmetic and honest conversations and the small unglamorous planning that almost no one writes about because it does not photograph well.</p>
          <p>You are not your paycheck. You never were. But your nervous system did not get the memo, and your financial planning quietly reflects that. The goal of the following chapters is to get the memo through.</p>
          <p style={{ opacity: .5, fontStyle: 'italic' }}>continues in the book</p>
        </div>
        <div style={{ marginTop: 48, display: 'flex', gap: 14, flexWrap: 'wrap' }}>
          <Btn kind="solid" href="#">Pre-order the book</Btn>
          <Btn kind="ghost" href="books.html">See all books</Btn>
        </div>
      </div>
    </section>
  );
}

    ['The first book I have read on leaving a salary that treats the reader like a competent adult with a budget, not a dreamer with a Pinterest board.', 'Noah K.'],
    ['Ian refuses to romanticize the jump. That is exactly why this book is useful.', 'Jenna M.'],
    ['A quiet, practical, almost stubbornly honest manual for the long middle of self-employment.', 'Elena P.'],
  ];
  return (
    <section className="section-pad" style={{ padding: '120px 56px', background: T.color.ink, color: T.color.page }}>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <Eyebrow color={T.color.copper}>Early praise</Eyebrow>
        <div className="contents-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 40, marginTop: 40 }}>
          {q.map(([a, b]) => (
            <div key={b}>
              <div style={{ fontFamily: T.font.quote, fontStyle: 'italic', fontSize: 22, lineHeight: 1.4 }}>&ldquo;{a}&rdquo;</div>
              <div style={{ fontFamily: T.font.body, fontSize: 12, fontWeight: 700, letterSpacing: '.15em', textTransform: 'uppercase', color: T.color.copper, marginTop: 20 }}>{b}</div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<>
  <Nav active="books" />
  <main>
    <Hero />
    <AboutBook />
    <Contents />
    <Excerpt />
    <Praise />
  </main>
  <Footer />
</>);

<script>(function(){var obs=new IntersectionObserver(function(e){e.forEach(function(x){if(x.isIntersecting){x.target.classList.add("in-view");obs.unobserve(x.target);}});},{threshold:0.05,rootMargin:"0px 0px -40px 0px"});var attached=new WeakSet();function attach(){document.querySelectorAll("section").forEach(function(s){if(!attached.has(s)){attached.add(s);obs.observe(s);}});}var tries=0;function poll(){attach();tries++;if(tries<60)setTimeout(poll,100);}if(document.readyState==="complete"){poll();}else{window.addEventListener("load",poll);}})();</script>
