// SAFEGUARD: pick today's devotional by matching current date, not by the
// stale `today: true` flag baked into the JSON. Falls back to the most recent
// entry whose date is <= today, then to the flagged one, then to the first.
function pickToday(list) {
  if (!Array.isArray(list) || list.length === 0) return null;
  const todayKey = new Date().toISOString().slice(0, 10);
  const withKeys = list.map(d => {
    const t = Date.parse(d.date);
    return { d, key: isNaN(t) ? '' : new Date(t).toISOString().slice(0, 10) };
  });
  const exact = withKeys.find(x => x.key === todayKey);
  if (exact) return exact.d;
  const past = withKeys.filter(x => x.key && x.key <= todayKey).sort((a, b) => (a.key < b.key ? 1 : -1))[0];
  if (past) return past.d;
  return list.find(d => d.today) || list[0];
}

function DailyApp() {
  const [list, setList] = React.useState(devotionals);
  React.useEffect(() => {
    fetch('/api/content/daily').then(r => r.json()).then(d => {
      if (Array.isArray(d) && d.length) setList(d);
    }).catch(() => {});
  }, []);
  const today = pickToday(list);
  const past = list.filter(d => d !== today);
  // Override the module-level devotionals reference so Archive() reads the updated list.
  window.__IJ_DAILY_LIST = list;
  window.__IJ_DAILY_TODAY = today;
  return (<>
    <Nav active="daily" />
    <main>
      <Hero />
      <Featured d={today} />
      <Archive />
      <Subscribe />
    </main>
    <Footer />
  </>);
}
