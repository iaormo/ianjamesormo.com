<script type="text/babel">
const T = window.IJ_TOKENS;

function Wordmark({ size = 0.7, onDark = false }) {
  const scale = typeof size === 'number' ? size : 0.7;
  const nameColor = onDark ? T.color.page : T.color.ink;
  return (
    <div style={{ display: 'inline-flex', flexDirection: 'column', lineHeight: 1, gap: 10 * scale }}>
      <div style={{ fontFamily: T.font.head, fontWeight: 900, fontSize: 96 * scale, letterSpacing: '-0.05em', textTransform: 'uppercase', color: nameColor, lineHeight: .85 }}>IAN</div><div style={{ fontFamily: T.font.head, fontWeight: 900, fontSize: 96 * scale, letterSpacing: '-0.05em', textTransform: 'uppercase', color: T.color.copper, lineHeight: .85 }}>JAMES</div>
    </div>
  );
}

function Nav({ active, onDark = false }) {
  const [open, setOpen] = React.useState(false);
  const items = [['home','Home','index.html'],['about','About','about.html'],['books','Books','books.html'],['daily','Devotional','daily.html'],['essays','Musings','essays.html'],['contact','Contact','contact.html']];
  const c = onDark ? T.color.page : T.color.ink;
  const bg = onDark ? T.color.ink : T.color.page;
  return (
    <nav style={{ position: 'relative', display: 'flex', justifyContent: 'flex-end', alignItems: 'center', padding: '20px 28px', borderBottom: `1px solid ${onDark ? 'rgba(255,255,255,.1)' : T.color.mist}` }}>
      <div className="nav-desktop" style={{ display: 'flex', gap: 28, alignItems: 'center' }}>
        {items.map(([k, label, href]) => (
          <a key={k} href={href} style={{ textDecoration: 'none', color: c, fontFamily: T.font.body, fontSize: 11, fontWeight: 600, letterSpacing: '.14em', textTransform: 'uppercase', opacity: active === k ? 1 : .55, borderBottom: active === k ? `2px solid ${T.color.copper}` : '2px solid transparent', paddingBottom: 3, whiteSpace: 'nowrap' }}>{label}</a>
        ))}
        <a href="newsletter.html" style={{ textDecoration: 'none', background: T.color.copper, color: T.color.page, fontFamily: T.font.body, fontSize: 11, fontWeight: 700, letterSpacing: '.14em', textTransform: 'uppercase', padding: '10px 16px', whiteSpace: 'nowrap' }}>Subscribe →</a>
      </div>
      <button className="nav-hamburger" onClick={() => setOpen(o => !o)} aria-label="Menu" style={{ display: 'none', background: 'none', border: 'none', cursor: 'pointer', padding: 6 }}>
        <span style={{ display: 'block', width: 22, height: 2, background: c, margin: '5px 0' }} />
        <span style={{ display: 'block', width: 22, height: 2, background: c, margin: '5px 0' }} />
        <span style={{ display: 'block', width: 22, height: 2, background: c, margin: '5px 0' }} />
      </button>
      {open && (
        <div style={{ position: 'absolute', top: '100%', left: 0, right: 0, background: bg, borderBottom: `1px solid ${T.color.mist}`, zIndex: 200, padding: '12px 0' }}>
          {items.map(([k, label, href]) => (
            <a key={k} href={href} style={{ display: 'block', padding: '12px 24px', textDecoration: 'none', color: c, fontFamily: T.font.body, fontSize: 13, fontWeight: 600, letterSpacing: '.14em', textTransform: 'uppercase', opacity: active === k ? 1 : .65, borderLeft: active === k ? `3px solid ${T.color.copper}` : '3px solid transparent' }}>{label}</a>
          ))}
          <div style={{ padding: '12px 24px' }}>
            <a href="newsletter.html" style={{ display: 'inline-block', background: T.color.copper, color: T.color.page, padding: '12px 20px', textDecoration: 'none', fontFamily: T.font.body, fontSize: 12, fontWeight: 700, letterSpacing: '.14em', textTransform: 'uppercase' }}>Subscribe →</a>
          </div>
        </div>
      )}
    </nav>
  );
}

function Footer() {
  return (
    <footer style={{ background: T.color.ink, color: T.color.page, padding: '72px 56px 36px' }}>
      <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr 1fr 1fr', gap: 48, paddingBottom: 56, borderBottom: '1px solid rgba(255,255,255,.1)' }}>
        <div>
          <Wordmark size={0.55} onDark />
          <div style={{ fontFamily: T.font.quote, fontStyle: 'italic', fontSize: 18, marginTop: 28, maxWidth: 380, lineHeight: 1.5, opacity: .85 }}>
            Writer of the unglamorous middle. Faith, work, and the long way home.
          </div>
        </div>
        {[
          ['Read',[['Books','books.html'],['Devotional','daily.html'],['Musings','essays.html']]],
          ['About',[['Story','about.html'],['Press / Media','about.html'],['Contact','contact.html']]],
          ['Follow',[['Newsletter','newsletter.html'],['Instagram','#'],['YouTube','#']]],
        ].map(([title, links]) => (
          <div key={title}>
            <div style={{ fontFamily: T.font.body, fontSize: 11, fontWeight: 700, letterSpacing: '.25em', textTransform: 'uppercase', color: T.color.copper, marginBottom: 18 }}>{title}</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              {links.map(([l, href]) => <a key={l} href={href} style={{ color: T.color.page, textDecoration: 'none', fontFamily: T.font.body, fontSize: 14, fontWeight: 500, opacity: .75 }}>{l}</a>)}
            </div>
          </div>
        ))}
      </div>
      <div className="footer-bottom" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', paddingTop: 28, fontFamily: T.font.body, fontSize: 12, opacity: .55 }}>
        <span>© 2026 Ian James Ormo. All rights reserved.</span>
        <span style={{ letterSpacing: '.2em', textTransform: 'uppercase' }}>Books · Words · Witness</span>
      </div>
    </footer>
  );
}

function Btn({ children, kind = 'primary', href }) {
  const styles = {
    primary: { background: T.color.copper, color: T.color.page, border: `2px solid ${T.color.copper}` },
    ghost:   { background: 'transparent', color: T.color.ink, border: `2px solid ${T.color.ink}` },
    solid:   { background: T.color.ink, color: T.color.page, border: `2px solid ${T.color.ink}` },
  };
  return <a href={href} style={{ ...styles[kind], textDecoration: 'none', padding: '16px 30px', display: 'inline-flex', alignItems: 'center', gap: 10, fontFamily: T.font.body, fontSize: 12, fontWeight: 700, letterSpacing: '.18em', textTransform: 'uppercase', cursor: 'pointer' }}>{children}</a>;
}

function Eyebrow({ children, color }) {
  return <div style={{ fontFamily: T.font.body, fontSize: 11, fontWeight: 700, letterSpacing: '.3em', textTransform: 'uppercase', color: color || T.color.copper, marginBottom: 20 }}>{children}</div>;
}

// ─── PAGE COMPONENTS ───────────────────────────────────────────

function Hero() {
  return (
    <section className="section-pad" style={{ padding: '88px 56px 72px', background: T.color.page }}>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <Eyebrow>About the writer</Eyebrow>
        <h1 className="hero-h" style={{ fontFamily: T.font.head, fontSize: 132, fontWeight: 900, lineHeight: .86, letterSpacing: '-0.05em', textTransform: 'uppercase', margin: 0 }}>
          I was not<br />rebuilt by <span style={{ color: T.color.copper }}>effort.</span>
        </h1>
        <div style={{ fontFamily: T.font.quote, fontSize: 26, fontStyle: 'italic', lineHeight: 1.45, color: T.color.steel, marginTop: 40, maxWidth: 760 }}>
          I was rebuilt by a grace I did not earn, a wife who stayed, and a thousand small unglamorous days I thought were not counting for anything.
        </div>
      </div>
    </section>
  );
}

function Story() {
  return (
    <section className="section-pad" style={{ padding: '72px 56px', background: T.color.bone }}>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <div className="story-grid" style={{ display: 'grid', gridTemplateColumns: '380px 1fr', gap: 72 }}>
          <div>
            <div style={{ aspectRatio: '3/4', position: 'relative', marginBottom: 20, overflow: 'hidden' }}>
              <img src="images/ian-author.png" alt="Ian James Ormo" style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover', objectPosition: 'center top' }} />
            </div>
            <div style={{ fontFamily: T.font.mono, fontSize: 11, color: T.color.steel, letterSpacing: '.1em' }}>IAN JAMES ORMO · DAUIN, PHILIPPINES</div>
          </div>
          <div style={{ fontFamily: T.font.body, fontSize: 18, lineHeight: 1.8, color: T.color.ink, maxWidth: 640 }}>
            <p style={{ marginTop: 0, fontFamily: T.font.quote, fontSize: 28, lineHeight: 1.4, fontStyle: 'italic' }}>
              I write for the person in the middle. Not the collapse, not the comeback. The long quiet part in between.
            </p>
            <p>I started in a call center at eighteen with no diploma and no connections. Just hunger and the sharp focus that necessity teaches. I walked onto a BPO floor and kept showing up, and consistently, over the years, compounded into something real: teams I hired and trained from nothing, operations I built and rebuilt, floors I ran, clients whose problems became mine at two in the morning.</p>
            <p>Just over a decade of that, it ended in twenty minutes in a room with people who were not unkind. What remained was a man in a parking lot trying to remember who he was outside the institution that had housed it.</p>
            <p style={{ fontFamily: T.font.quote, fontSize: 22, lineHeight: 1.55, borderLeft: `3px solid ${T.color.copper}`, paddingLeft: 22, margin: '36px 0', color: T.color.ink, fontStyle: 'italic' }}>
              The books came from there. They are for the person who has started to suspect that the small, unglamorous thing they did today was the foundation.
            </p>
            <p>I have been freelancing for nearly a decade now. I build automations, work in tech, and run ScalePlus, which I founded because I had spent too long watching people get stuck inside systems that were never built to set them free. I am also a homeschool father, raising three children with my wife from our home in Dauin, Negros Oriental. It is the most unglamorous and most important thing I have ever done.</p>
            <p>If you are in the middle, still here, still showing up, still doing the next small thing, the writing on this site is for you.</p>
            <div style={{ marginTop: 40 }}><Btn kind="solid" href="books.html">See the books →</Btn></div>
          </div>
        </div>
      </div>
    </section>
  );
}

function Stats() {
  const stats = [
    ['2', 'Books in print'],
    ['~10 yrs', 'Freelancing in tech and automations'],
    ['14 yrs', 'Marriage · still showing up'],
  ];
  return (
    <section className="section-pad" style={{ padding: '96px 56px', background: T.color.ink, color: T.color.page }}>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <div className="stats-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 1, background: 'rgba(255,255,255,.08)' }}>
          {stats.map(([n, l]) => (
            <div key={l} style={{ background: T.color.ink, padding: '40px 24px' }}>
              <div style={{ fontFamily: T.font.head, fontSize: 64, fontWeight: 900, lineHeight: 1, letterSpacing: '-0.04em', color: T.color.copper, marginBottom: 16 }}>{n}</div>
              <div style={{ fontFamily: T.font.body, fontSize: 13, fontWeight: 600, letterSpacing: '.12em', textTransform: 'uppercase', opacity: .85 }}>{l}</div>
            </div>
          ))}
        </div>
      </div>
    </section>

}

function Timeline() {
  const items = [
    ['18', 'Joined the BPO industry in Bacolod with no diploma. Promoted to supervisor within the year by learning to read a room before anyone taught him to.'],
    ['A decade in', 'Built teams, operations, floors, clients. Also built something else, quietly, in the wrong direction.'],
    ['The parking lot', 'Lost the job. Sat in a white Ford Fiesta with a Marlboro and a corporate envelope. Came home and started doing the next small unglamorous thing.'],
    ['Nearly a decade ago', 'Left the building with a manila envelope and no clean plan. Started freelancing in tech and automations. Founded ScalePlus.'],
    ['Now', 'Writing from Dauin, Negros Oriental. Homeschooling three children. Running ScalePlus. Getting the Sunday letter out every week.'],
  ];
  return (
    <section className="section-pad" style={{ padding: '120px 56px', background: T.color.page }}>
      <div style={{ maxWidth: 1000, margin: '0 auto' }}>
        <Eyebrow>The road</Eyebrow>
        <div style={{ fontFamily: T.font.head, fontSize: 64, fontWeight: 900, lineHeight: .92, letterSpacing: '-0.04em', textTransform: 'uppercase', marginBottom: 64 }}>
          The long way<br /><span style={{ color: T.color.copper }}>home.</span>
        </div>
        {items.map(([yr, body], i) => (
          <div key={yr} style={{ display: 'grid', gridTemplateColumns: '140px 1fr', gap: 40, padding: '36px 0', borderTop: `1px solid ${T.color.mist}`, borderBottom: i === items.length - 1 ? `1px solid ${T.color.mist}` : 'none' }}>

            <div style={{ fontFamily: T.font.body, fontSize: 17, lineHeight: 1.7, color: T.color.ink }}>{body}</div>
          </div>
        ))}
      </div>
    </section>
  );
}

function NewsletterCTA() {
  const [form, setForm] = React.useState({ first: '', last: '', email: '' });
  const [step, setStep] = React.useState('idle');
  async function api(source) {
    try { const r = await fetch('/api/subscribe', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ...form, source }) }); return r.ok; } catch { return false; }
  }
  async function submit(e) {
    e.preventDefault();
    if (!form.first || !form.last || !form.email) return;
    setStep('submitting');
    await api('newsletter');
    setStep('cross');
  }
  async function addBoth() { setStep('submitting'); await api('both'); setStep('thanks'); }
  const inp = { flex: 1, border: 'none', padding: '16px 18px', fontFamily: T.font.body, fontSize: 14, background: 'transparent', color: T.color.ink, outline: 'none' };
  return (
    <section className="section-pad" style={{ padding: '120px 56px', background: T.color.copper, color: T.color.page }}>
      <div style={{ maxWidth: 840, margin: '0 auto', textAlign: 'center' }}>
        <Eyebrow color={T.color.ink}>The Sunday letter</Eyebrow>
        <div style={{ fontFamily: T.font.head, fontSize: 72, fontWeight: 900, lineHeight: .9, letterSpacing: '-0.04em', textTransform: 'uppercase', marginBottom: 32 }}>
          Get one letter<br />every Sunday<br />morning.
        </div>
        <div style={{ fontFamily: T.font.quote, fontSize: 20, fontStyle: 'italic', lineHeight: 1.55, maxWidth: 580, margin: '0 auto 40px' }}>
          Some weeks it&rsquo;s a passage that hit me at 5am. Some weeks it&rsquo;s a question I&rsquo;ve been sitting with. Every week it&rsquo;s the thing I actually needed to hear.
        </div>
        {step === 'thanks' ? (
          <div style={{ fontFamily: T.font.quote, fontSize: 28, fontStyle: 'italic', color: T.color.ink }}>You&rsquo;re in. See you Sunday.</div>
        ) : step === 'cross' ? (
          <div style={{ maxWidth: 560, margin: '0 auto' }}>
            <div style={{ fontFamily: T.font.quote, fontStyle: 'italic', fontSize: 22, lineHeight: 1.45, color: T.color.ink, marginBottom: 24 }}>You&rsquo;re in. Would you like the daily devotional too? Three minutes every morning.</div>
            <div style={{ display: 'flex', gap: 10, justifyContent: 'center', flexWrap: 'wrap' }}>
              <button onClick={addBoth} style={{ background: T.color.ink, color: T.color.page, border: 'none', padding: '14px 26px', fontFamily: T.font.body, fontSize: 12, fontWeight: 700, letterSpacing: '.18em', textTransform: 'uppercase', cursor: 'pointer' }}>Yes, send me that too</button>
              <button onClick={() => setStep('thanks')} style={{ background: 'transparent', color: T.color.ink, border: `2px solid ${T.color.ink}`, padding: '12px 24px', fontFamily: T.font.body, fontSize: 12, fontWeight: 700, letterSpacing: '.18em', textTransform: 'uppercase', cursor: 'pointer' }}>No thanks</button>
            </div>
          </div>
        ) : (
          <form onSubmit={submit} style={{ maxWidth: 480, margin: '0 auto' }}>
            <div style={{ display: 'flex', background: T.color.page, marginBottom: 2 }}>
              <input type="text" placeholder="First name" value={form.first} onChange={e => setForm(f => ({ ...f, first: e.target.value }))} required style={{ ...inp, borderRight: '1px solid #E6E1D8' }} />
              <input type="text" placeholder="Last name" value={form.last} onChange={e => setForm(f => ({ ...f, last: e.target.value }))} required style={inp} />
            </div>
            <div style={{ display: 'flex', background: T.color.page }}>
              <input type="email" placeholder="your@email.com" value={form.email} onChange={e => setForm(f => ({ ...f, email: e.target.value }))} required style={inp} />
              <button type="submit" disabled={step === 'submitting'} style={{ background: T.color.ink, color: T.color.page, border: 'none', padding: '0 24px', fontFamily: T.font.body, fontSize: 11, fontWeight: 700, letterSpacing: '.18em', textTransform: 'uppercase', cursor: 'pointer', whiteSpace: 'nowrap', opacity: step === 'submitting' ? .6 : 1 }}>{step === 'submitting' ? 'Sending…' : 'Subscribe →'}</button>
            </div>
          </form>
        )}
        <div style={{ fontFamily: T.font.body, fontSize: 12, marginTop: 16, opacity: .75 }}>Unsubscribe anytime</div>
      </div>
    </section>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<>
  <Nav active="about" />
  <main>
    <Hero />
    <Story />
    <Stats />
    <Timeline />
    <NewsletterCTA />
  </main>
  <Footer />
</>);
</script>
<script>(function(){var obs=new IntersectionObserver(function(e){e.forEach(function(x){if(x.isIntersecting){x.target.classList.add("in-view");obs.unobserve(x.target);}});},{threshold:0.05,rootMargin:"0px 0px -40px 0px"});var attached=new WeakSet();function attach(){document.querySelectorAll("section").forEach(function(s){if(!attached.has(s)){attached.add(s);obs.observe(s);}});}var tries=0;function poll(){attach();tries++;if(tries<60)setTimeout(poll,100);}if(document.readyState==="complete"){poll();}else{window.addEventListener("load",poll);}})();</script>
<script src="/js/newsletter-popup.js" defer></script>
</body>
</html>
