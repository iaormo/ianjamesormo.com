<script type="text/babel">
const { useState } = React;
const T = window.IJ_TOKENS;

function Nav() {
  const [open, setOpen] = useState(false);
  const items = [['home','Home','index.html'],['about','About','about.html'],['books','Books','books.html'],['daily','Devotional','daily.html'],['essays','Musings','essays.html'],['contact','Contact','contact.html']];
  return (
    <nav className="nav-pad" style={{ position: 'relative', display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '28px 56px', borderBottom: `1px solid ${T.color.mist}`, background: T.color.page }}>
      <div className="nav-full" style={{ display: 'flex', gap: 36, alignItems: 'center', flexWrap: 'wrap' }}>
        {items.map(([k, label, href]) => (
          <a key={k} href={href} style={{ textDecoration: 'none', color: T.color.ink, fontFamily: T.font.body, fontSize: 12, fontWeight: 600, letterSpacing: '.14em', textTransform: 'uppercase', opacity: .55, borderBottom: '2px solid transparent', paddingBottom: 4 }}>{label}</a>
        ))}
      </div>
      <button className="nav-mobile-btn" onClick={() => setOpen(o => !o)} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 8 }} aria-label="Menu">
        <span style={{ display: 'block', width: 24, height: 2, background: T.color.ink, margin: '5px 0' }} />
        <span style={{ display: 'block', width: 24, height: 2, background: T.color.ink, margin: '5px 0' }} />
        <span style={{ display: 'block', width: 24, height: 2, background: T.color.ink, margin: '5px 0' }} />
      </button>
      <div className={`mobile-menu ${open ? 'open' : ''}`} style={{ position: 'absolute', top: '100%', left: 0, right: 0, background: T.color.page, borderBottom: `1px solid ${T.color.mist}`, flexDirection: 'column', padding: '16px 0', zIndex: 100 }}>
        {items.map(([k, label, href]) => (
          <a key={k} href={href} style={{ padding: '14px 24px', textDecoration: 'none', color: T.color.ink, fontFamily: T.font.body, fontSize: 13, fontWeight: 600, letterSpacing: '.14em', textTransform: 'uppercase', opacity: .7 }}>{label}</a>
        ))}
      </div>
    </nav>
  );
}

function Footer() {
  return (
    <footer style={{ background: T.color.ink, color: T.color.page, padding: '72px 32px 36px' }}>
      <div className="footer-grid" style={{ display: 'grid', gridTemplateColumns: '2fr 1fr 1fr 1fr', gap: 48, paddingBottom: 56, borderBottom: '1px solid rgba(255,255,255,.1)', maxWidth: 1400, margin: '0 auto' }}>
        <div>
          <div style={{ fontFamily: T.font.head, fontSize: 34, fontWeight: 900, letterSpacing: '-0.04em', textTransform: 'uppercase', lineHeight: .85 }}>IAN</div>
          <div style={{ fontFamily: T.font.head, fontSize: 34, fontWeight: 900, letterSpacing: '-0.04em', textTransform: 'uppercase', lineHeight: .85, color: T.color.copper }}>JAMES</div>
          <div style={{ fontFamily: T.font.quote, fontStyle: 'italic', fontSize: 17, marginTop: 20, maxWidth: 380, lineHeight: 1.5, opacity: .85 }}>Writer of the unglamorous middle. Faith, work, and the long way home.</div>
        </div>
        {[
          ['Read',[['Books','books.html'],['Devotional','daily.html'],['Musings','essays.html']]],
          ['About',[['Story','about.html'],['Contact','contact.html']]],
          ['Follow',[['Newsletter','newsletter.html'],['Instagram','https://www.instagram.com/ianormore'],['LinkedIn','https://www.linkedin.com/in/ianjamesormo/'],['Facebook','https://www.facebook.com/ian.ormo']]],
        ].map(([title, links]) => (
          <div key={title}>
            <div style={{ fontFamily: T.font.body, fontSize: 11, fontWeight: 700, letterSpacing: '.25em', textTransform: 'uppercase', color: T.color.copper, marginBottom: 18 }}>{title}</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              {links.map(([l, href]) => <a key={l} href={href} style={{ color: T.color.page, textDecoration: 'none', fontFamily: T.font.body, fontSize: 14, fontWeight: 500, opacity: .75 }}>{l}</a>)}
            </div>
          </div>
        ))}
      </div>
      <div className="footer-bottom" style={{ maxWidth: 1400, margin: '0 auto', display: 'flex', justifyContent: 'space-between', alignItems: 'center', paddingTop: 28, fontFamily: T.font.body, fontSize: 12, opacity: .55, flexWrap: 'wrap', gap: 12 }}>
        <span>© 2026 Ian James Ormo. All rights reserved.</span>
        <span style={{ letterSpacing: '.2em', textTransform: 'uppercase' }}>Books · Words · Witness</span>
      </div>
    </footer>
  );
}

function Hero() {
  const [form, setForm] = useState({ first: '', last: '', email: '' });
  const [step, setStep] = useState('idle');
  async function api(source) {
    try { const r = await fetch('/api/subscribe', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ...form, source }) }); return r.ok; } catch { return false; }
  }
  async function submit(e) {
    e.preventDefault();
    if (!form.first || !form.last || !form.email) return;
    setStep('submitting');
    await api('newsletter');
    setStep('cross');
  }
  async function addBoth() {
    setStep('submitting');
    await api('both');
    setStep('thanks');
  }
  const inputStyle = { width: '100%', border: `1px solid rgba(255,255,255,.35)`, background: 'transparent', padding: '16px 18px', fontFamily: T.font.body, fontSize: 15, color: T.color.page, outline: 'none' };
  return (
    <section className="section-pad" style={{ padding: '96px 56px 120px', background: T.color.copper, color: T.color.page }}>
      <div className="nl-grid" style={{ maxWidth: 1200, margin: '0 auto', display: 'grid', gridTemplateColumns: '1fr 420px', gap: 80, alignItems: 'center' }}>
        <div>
          <div style={{ fontFamily: T.font.body, fontSize: 11, fontWeight: 700, letterSpacing: '.3em', textTransform: 'uppercase', opacity: .8, marginBottom: 20 }}>The letter</div>
          <h1 style={{ fontFamily: T.font.head, fontSize: 'clamp(44px, 6.5vw, 104px)', fontWeight: 900, lineHeight: 1, letterSpacing: '-0.04em', textTransform: 'uppercase', margin: 0 }}>
            <span style={{ display: 'block' }}>One letter.</span>
            <span style={{ display: 'block', color: T.color.ink }}>Sunday morning.</span>
          </h1>
          <div style={{ fontFamily: T.font.quote, fontStyle: 'italic', fontSize: 22, marginTop: 32, maxWidth: 620, lineHeight: 1.55, opacity: .95 }}>
            Some weeks it is a passage that hit me at 5am. Some weeks it is a question I have been sitting with. Every week it is the thing I actually needed to hear, not the thing that sounds good in a subject line.
          </div>
        </div>
        <div style={{ background: T.color.ink, padding: 36 }}>
          {step === 'thanks' ? (
            <div>
              <div style={{ fontFamily: T.font.body, fontSize: 11, fontWeight: 700, letterSpacing: '.3em', textTransform: 'uppercase', color: T.color.copper, marginBottom: 14 }}>You are in</div>
              <div style={{ fontFamily: T.font.quote, fontStyle: 'italic', fontSize: 24, lineHeight: 1.4, color: T.color.page }}>See you Sunday. Check your inbox for the confirmation.</div>
            </div>
          ) : step === 'cross' ? (
            <div>
              <div style={{ fontFamily: T.font.body, fontSize: 11, fontWeight: 700, letterSpacing: '.3em', textTransform: 'uppercase', color: T.color.copper, marginBottom: 14 }}>One more?</div>
              <div style={{ fontFamily: T.font.quote, fontStyle: 'italic', fontSize: 20, lineHeight: 1.45, color: T.color.page, marginBottom: 24 }}>Would you like the daily devotional too? Three minutes every morning.</div>
              <button onClick={addBoth} style={{ width: '100%', background: T.color.copper, color: T.color.page, border: 'none', padding: '14px 20px', marginBottom: 10, fontFamily: T.font.body, fontSize: 12, fontWeight: 700, letterSpacing: '.2em', textTransform: 'uppercase', cursor: 'pointer' }}>Yes, send me that too</button>
              <button onClick={() => setStep('thanks')} style={{ width: '100%', background: 'transparent', color: T.color.page, border: `1px solid rgba(255,255,255,.35)`, padding: '12px 20px', fontFamily: T.font.body, fontSize: 12, fontWeight: 700, letterSpacing: '.2em', textTransform: 'uppercase', cursor: 'pointer' }}>No thanks</button>
            </div>
          ) : (
            <form onSubmit={submit}>
              <div style={{ fontFamily: T.font.body, fontSize: 11, fontWeight: 700, letterSpacing: '.3em', textTransform: 'uppercase', color: T.color.copper, marginBottom: 18 }}>Subscribe free</div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 12 }}>
                <input required placeholder="First name" value={form.first} onChange={e => setForm(f => ({ ...f, first: e.target.value }))} style={inputStyle} />
                <input required placeholder="Last name" value={form.last} onChange={e => setForm(f => ({ ...f, last: e.target.value }))} style={inputStyle} />
              </div>
              <input required type="email" placeholder="your@email.com" value={form.email} onChange={e => setForm(f => ({ ...f, email: e.target.value }))} style={{ ...inputStyle, marginBottom: 20 }} />
              <button type="submit" disabled={step === 'submitting'} style={{ width: '100%', background: T.color.copper, color: T.color.page, border: 'none', padding: '16px 24px', fontFamily: T.font.body, fontSize: 12, fontWeight: 700, letterSpacing: '.2em', textTransform: 'uppercase', cursor: 'pointer', opacity: step === 'submitting' ? .6 : 1 }}>
                {step === 'submitting' ? 'Sending…' : 'Get the letter →'}
              </button>
              <div style={{ fontFamily: T.font.body, fontSize: 11, marginTop: 16, opacity: .6, color: T.color.page, textAlign: 'center' }}>Unsubscribe anytime.</div>
            </form>
          )}
        </div>
      </div>
    </section>
  );
}

function What() {
  const features = [
    ['One letter', 'Not a newsletter roundup. Not three things I liked this week. One piece, written for you.'],
    ['No subject-line tricks', 'No urgency theater. No curiosity gaps. The subject line is the subject.'],
    ['From a real person', 'Written by me. No ghostwriter. No team. Just what I wrote that week.'],
  ];
  return (
    <section className="section-pad" style={{ padding: '96px 56px', background: T.color.page }}>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <div style={{ fontFamily: T.font.body, fontSize: 11, fontWeight: 700, letterSpacing: '.3em', textTransform: 'uppercase', color: T.color.copper, marginBottom: 20 }}>What you get</div>
        <div style={{ fontFamily: T.font.head, fontSize: 'clamp(32px, 5vw, 72px)', fontWeight: 900, lineHeight: 1.04, letterSpacing: '-0.04em', textTransform: 'uppercase', marginBottom: 56, maxWidth: 900 }}>
          The thing you actually <span style={{ color: T.color.copper }}>needed to hear.</span>
        </div>
        <div className="nl-features" style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 40 }}>
          {features.map(([h, b]) => (
            <div key={h}>
              <div style={{ fontFamily: T.font.head, fontSize: 22, fontWeight: 800, lineHeight: 1.2, letterSpacing: '-0.02em', marginBottom: 14 }}>{h}</div>
              <div style={{ fontFamily: T.font.body, fontSize: 15, lineHeight: 1.6, color: T.color.steel }}>{b}</div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function Sample() {
  return (
    <section className="section-pad" style={{ padding: '96px 56px', background: T.color.bone }}>
      <div style={{ maxWidth: 900, margin: '0 auto' }}>
        <div style={{ fontFamily: T.font.body, fontSize: 11, fontWeight: 700, letterSpacing: '.3em', textTransform: 'uppercase', color: T.color.copper, marginBottom: 20 }}>A recent musing</div>
        <div style={{ fontFamily: T.font.mono, fontSize: 12, color: T.color.steel, marginBottom: 24 }}>[ WORK · APR 08 · 2026 · 11 MIN READ ]</div>
        <div style={{ fontFamily: T.font.head, fontSize: 'clamp(30px, 4.2vw, 54px)', fontWeight: 900, lineHeight: 1.05, letterSpacing: '-0.03em', textTransform: 'uppercase', marginBottom: 32 }}>
          Worth and the paycheck ceiling.
        </div>
        <div style={{ fontFamily: T.font.quote, fontSize: 19, lineHeight: 1.7, color: T.color.ink, marginBottom: 24 }}>
          The paycheck ceiling is not about greed. It is about safety. The number you were paid was, at some point, validated by someone you respected or feared. It represented what the market said you were worth.
        </div>
        <div style={{ fontFamily: T.font.quote, fontSize: 19, lineHeight: 1.7, color: T.color.ink, marginBottom: 40 }}>
          Your value was never the number. But your nervous system never got that memo.
        </div>
        <a href="essays.html" style={{ fontFamily: T.font.body, fontSize: 12, fontWeight: 700, letterSpacing: '.2em', textTransform: 'uppercase', color: T.color.copper, textDecoration: 'none' }}>Read past musings →</a>
      </div>
    </section>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <><Nav /><Hero /><What /><Sample /><Footer /></>
);
</script>
<script>(function(){var obs=new IntersectionObserver(function(e){e.forEach(function(x){if(x.isIntersecting){x.target.classList.add("in-view");obs.unobserve(x.target);}});},{threshold:0.05,rootMargin:"0px 0px -40px 0px"});var attached=new WeakSet();function attach(){document.querySelectorAll("section").forEach(function(s){if(!attached.has(s)){attached.add(s);obs.observe(s);}});}var tries=0;function poll(){attach();tries++;if(tries<60)setTimeout(poll,100);}if(document.readyState==="complete"){poll();}else{window.addEventListener("load",poll);}})();</script>
