<script type="text/babel">
const T = window.IJ_TOKENS;

function Wordmark({ size = 0.7, onDark = false }) {
  const scale = typeof size === 'number' ? size : 0.7;
  const nameColor = onDark ? T.color.page : T.color.ink;
  return (
    <div style={{ display: 'inline-flex', flexDirection: 'column', lineHeight: 1, gap: 10 * scale }}>
      <div style={{ fontFamily: T.font.head, fontWeight: 900, fontSize: 96 * scale, letterSpacing: '-0.05em', textTransform: 'uppercase', color: nameColor, lineHeight: .85 }}>IAN</div><div style={{ fontFamily: T.font.head, fontWeight: 900, fontSize: 96 * scale, letterSpacing: '-0.05em', textTransform: 'uppercase', color: T.color.copper, lineHeight: .85 }}>JAMES</div>
    </div>
  );
}

function Nav({ active }) {
  const [open, setOpen] = React.useState(false);
  const items = [['home','Home','index.html'],['about','About','about.html'],['books','Books','books.html'],['daily','Devotional','daily.html'],['essays','Musings','essays.html'],['contact','Contact','contact.html']];
  const c = T.color.page;
  return (
    <nav style={{ position: 'relative', display: 'flex', justifyContent: 'flex-end', alignItems: 'center', padding: '20px 28px', borderBottom: `1px solid rgba(255,255,255,.1)`, background: T.color.ink }}>
      <div className="nav-desktop" style={{ display: 'flex', gap: 28, alignItems: 'center' }}>
        {items.map(([k, label, href]) => (
          <a key={k} href={href} style={{ textDecoration: 'none', color: c, fontFamily: T.font.body, fontSize: 11, fontWeight: 600, letterSpacing: '.14em', textTransform: 'uppercase', opacity: active === k ? 1 : .55, borderBottom: active === k ? `2px solid ${T.color.copper}` : '2px solid transparent', paddingBottom: 3, whiteSpace: 'nowrap' }}>{label}</a>
        ))}
        <a href="newsletter.html" style={{ textDecoration: 'none', background: T.color.copper, color: T.color.page, fontFamily: T.font.body, fontSize: 11, fontWeight: 700, letterSpacing: '.14em', textTransform: 'uppercase', padding: '10px 16px', whiteSpace: 'nowrap' }}>Subscribe →</a>
      </div>
      <button className="nav-hamburger" onClick={() => setOpen(o => !o)} aria-label="Menu" style={{ display: 'none', background: 'none', border: 'none', cursor: 'pointer', padding: 6 }}>
        <span style={{ display: 'block', width: 22, height: 2, background: c, margin: '5px 0' }} />
        <span style={{ display: 'block', width: 22, height: 2, background: c, margin: '5px 0' }} />
        <span style={{ display: 'block', width: 22, height: 2, background: c, margin: '5px 0' }} />
      </button>
      {open && (
        <div style={{ position: 'absolute', top: '100%', left: 0, right: 0, background: T.color.ink, borderBottom: `1px solid rgba(255,255,255,.1)`, zIndex: 200, padding: '12px 0' }}>
          {items.map(([k, label, href]) => (
            <a key={k} href={href} style={{ display: 'block', padding: '12px 24px', textDecoration: 'none', color: c, fontFamily: T.font.body, fontSize: 13, fontWeight: 600, letterSpacing: '.14em', textTransform: 'uppercase', opacity: active === k ? 1 : .65, borderLeft: active === k ? `3px solid ${T.color.copper}` : '3px solid transparent' }}>{label}</a>
          ))}
          <div style={{ padding: '12px 24px' }}>
            <a href="newsletter.html" style={{ display: 'inline-block', background: T.color.copper, color: T.color.page, padding: '12px 20px', textDecoration: 'none', fontFamily: T.font.body, fontSize: 12, fontWeight: 700, letterSpacing: '.14em', textTransform: 'uppercase' }}>Subscribe →</a>
          </div>
        </div>
      )}
    </nav>
  );
}

function Footer() {
  return (
    <footer style={{ background: T.color.ink, color: T.color.page, padding: '72px 56px 36px' }}>

          <div style={{ fontFamily: T.font.quote, fontStyle: 'italic', fontSize: 18, marginTop: 28, maxWidth: 380, lineHeight: 1.5, opacity: .85 }}>Writer of the unglamorous middle. Faith, work, and the long way home.</div>
        </div>
        {[
          ['Read',[['Books','books.html'],['Devotional','daily.html'],['Musings','essays.html']]],
          ['About',[['Story','about.html'],['Press / Media','about.html'],['Contact','contact.html']]],
          ['Follow',[['Newsletter','newsletter.html'],['Instagram','#'],['YouTube','#']]],

          <div key={title}>
            <div style={{ fontFamily: T.font.body, fontSize: 11, fontWeight: 700, letterSpacing: '.25em', textTransform: 'uppercase', color: T.color.copper, marginBottom: 18 }}>{title}</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              {links.map(([l, href]) => <a key={l} href={href} style={{ color: T.color.page, textDecoration: 'none', fontFamily: T.font.body, fontSize: 14, fontWeight: 500, opacity: .75 }}>{l}</a>)}
            </div>
          </div>
        ))}
      </div>
      <div className="footer-bottom" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', paddingTop: 28, fontFamily: T.font.body, fontSize: 12, opacity: .55 }}>
        <span>© 2026 Ian James Ormo. All rights reserved.</span>
        <span style={{ letterSpacing: '.2em', textTransform: 'uppercase' }}>Books · Words · Witness</span>
      </div>
    </footer>
  );
}

function BookCover({ title, subtitle, variant = 'ink', w = 280, h = 420, rotate = 0 }) {
  const palettes = {
    ink:    { bg: T.color.ink,    fg: T.color.page, accent: T.color.copper, spine: '#000' },
    copper: { bg: T.color.copper, fg: T.color.page, accent: T.color.ink,    spine: '#7a2f12' },
    page:   { bg: T.color.page,   fg: T.color.ink,  accent: T.color.copper, spine: '#d9d3c5' },
    bone:   { bg: T.color.bone,   fg: T.color.ink,  accent: T.color.copper, spine: '#d9d3c5' },
  };
  const p = palettes[variant] || palettes.ink;
  return (
    <div style={{
      width: w, height: h, background: p.bg, color: p.fg, position: 'relative',
      boxShadow: `0 0 0 1px rgba(0,0,0,.05), 40px 55px 110px -30px rgba(0,0,0,.55), 14px 22px 44px -10px rgba(0,0,0,.32), inset 10px 0 14px -10px rgba(0,0,0,.45), inset -2px 0 0 rgba(255,255,255,.06)`,
      transform: `perspective(1600px) rotateY(-7deg) rotate(${rotate}deg)`,
      transformOrigin: 'center',
      flexShrink: 0,
      borderRadius: '2px 3px 3px 2px',
    }}>
      <div style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: 6, background: `linear-gradient(90deg, ${p.spine} 0%, rgba(0,0,0,.25) 40%, transparent 100%)`, pointerEvents: 'none' }} />
      <div style={{ position: 'absolute', inset: 0, padding: '9%', display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
        <div>
          <div style={{ fontFamily: T.font.head, fontSize: w * .13, fontWeight: 900, lineHeight: .95, letterSpacing: '-0.035em', textTransform: 'uppercase' }}>{title}</div>
          <div style={{ width: w * .22, height: 4, background: p.accent, margin: `${w * .04}px 0` }} />
          {subtitle && <div style={{ fontFamily: T.font.body, fontSize: w * .045, fontWeight: 500, lineHeight: 1.35, opacity: .88 }}>{subtitle}</div>}
        </div>
      </div>
      <div style={{ position: 'absolute', bottom: '9%', left: '9%', fontFamily: T.font.body, fontSize: w * .028, fontWeight: 700, letterSpacing: '.2em', textTransform: 'uppercase', opacity: .55, color: p.fg }}>Ian James Ormo</div>
    </div>
  );
}


function Btn({ children, kind = 'primary', href, dark }) {
  const styles = {
    primary: { background: T.color.copper, color: T.color.page, border: `2px solid ${T.color.copper}` },
    ghost:   { background: 'transparent', color: dark ? T.color.page : T.color.ink, border: `2px solid ${dark ? 'rgba(255,255,255,.35)' : T.color.ink}` },
    solid:   { background: T.color.ink, color: T.color.page, border: `2px solid ${T.color.ink}` },
  };
  return <a href={href} style={{ ...styles[kind], textDecoration: 'none', padding: '16px 30px', display: 'inline-flex', alignItems: 'center', gap: 10, fontFamily: T.font.body, fontSize: 12, fontWeight: 700, letterSpacing: '.18em', textTransform: 'uppercase' }}>{children}</a>;
}

function Eyebrow({ children, color }) {
  return <div style={{ fontFamily: T.font.body, fontSize: 11, fontWeight: 700, letterSpacing: '.3em', textTransform: 'uppercase', color: color || T.color.copper, marginBottom: 20 }}>{children}</div>;
}

// ─── PAGE COMPONENTS ───────────────────────────────────────────

const NOT = <span style={{fontFamily:T.font.quote,fontStyle:'italic',fontWeight:400,letterSpacing:'0em',textTransform:'none',fontSize:'1.5em',lineHeight:.8}}>not</span>;

function Hero() {
  return (
    <section className="section-pad" style={{ background: T.color.ink, color: T.color.page, padding: '80px 56px 100px' }}>
      <div style={{ maxWidth: 1400, margin: '0 auto' }}>
        <div className="hero-grid" style={{ display: 'grid', gridTemplateColumns: '400px 1fr', gap: 80, alignItems: 'center' }}>
          <div style={{ display: 'flex', justifyContent: 'center' }}>
            <BookCover
              title={<>You are<br />{NOT}<br />finished</>}
              subtitle="Grace, grit, and the long way home."
              variant="copper"
              w={360} h={540} rotate={-2}
            />
          </div>
          <div>
            <div style={{ fontFamily: T.font.mono, fontSize: 12, color: T.color.copper, letterSpacing: '.15em', marginBottom: 18 }}>[ Memoir · Coming soon ]</div>
            <h1 className="hero-h" style={{ fontFamily: T.font.head, fontSize: 112, fontWeight: 900, lineHeight: .85, letterSpacing: '-0.05em', textTransform: 'uppercase', margin: '0 0 32px' }}>
              You are {NOT} <span style={{ color: T.color.copper }}>finished.</span>
            </h1>
            <div style={{ fontFamily: T.font.quote, fontSize: 24, fontStyle: 'italic', lineHeight: 1.4, opacity: .9, maxWidth: 580, marginBottom: 40 }}>
              A memoir about the unglamorous daily work of being rebuilt. By grace you didn&rsquo;t earn, a wife who stayed, and a God who keeps no receipts.
            </div>
            <div style={{ display: 'flex', gap: 14, flexWrap: 'wrap', marginBottom: 36 }}>
              <Btn kind="primary" href="#">Pre-order →</Btn>
              <Btn kind="ghost" dark href="#excerpt">Read the opening</Btn>
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

function AboutBook() {
  return (
    <section className="section-pad" style={{ padding: '120px 56px', background: T.color.page }}>
      <div style={{ maxWidth: 960, margin: '0 auto' }}>
        <Eyebrow>About the book</Eyebrow>
        <div style={{ fontFamily: T.font.head, fontSize: 52, fontWeight: 900, lineHeight: .95, letterSpacing: '-0.035em', textTransform: 'uppercase', marginBottom: 48 }}>
          A book for the person<br />in the long middle.
        </div>
        <div style={{ fontFamily: T.font.body, fontSize: 19, lineHeight: 1.8, color: T.color.ink }}>
          <p style={{ marginTop: 0 }}>There is a part of a life that does not photograph well. It is not the collapse, that part makes a good story later. It is not the comeback, that part sells books. It is the long, quiet middle, where the lights are not on and no one is watching, and where the only question is whether you will do the next small, unglamorous thing.</p>
          <p style={{ fontFamily: T.font.quote, fontStyle: 'italic', fontSize: 26, lineHeight: 1.45, borderLeft: `3px solid ${T.color.copper}`, paddingLeft: 28, margin: '48px 0', color: T.color.ink }}>
            This book is about that part. Grace that arrived before I was ready. A wife who stayed when she could have left. The kind of faith that keeps no receipts.
          </p>
          <p>It is not a recovery memoir. It is not a system. It is a record of what the body carried, and what was rebuilt in me when I was not looking. If you have been doing the next small thing for a long time and wondering whether anything is counting, this book is a letter to you. It is counting.</p>
        </div>
      </div>
    </section>
  );
}

function Contents() {
  const parts = [
    ['I', 'The Decade', [
      'Ch 1 · The Kid Nobody Expected',
      'Ch 2 · What the Years Built and What They Broke',
    ]],
    ['II', 'The Storm', [
      'Ch 3 · The Last Day',
      'Ch 4 · The Encounter',
      'Ch 5 · The Rebuilding Nobody Saw',
      'Ch 6 · The Second Storm',
    ]],
    ['III', 'The Long Way Back', [
      'Ch 7 · The Permission You Stopped Needing',
      'Ch 8 · The Number in Your Head',
      'Ch 9 · What a Day Is Actually For',
      'Ch 10 · The Version of You That No One Assigned',
      'Ch 11 · What Holds When You Cannot',
      'Ch 12 · The Long Faithfulness',
    ]],
    ['IV', 'The Arrival', [
      'Ch 13 · The Blessing and the Road',
      'Ch 14 · The Second Parking Lot',
    ]],
  ];
  return (
    <section className="section-pad" style={{ padding: '120px 56px', background: T.color.bone }}>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <Eyebrow>Contents</Eyebrow>
        <div style={{ fontFamily: T.font.head, fontSize: 56, fontWeight: 900, lineHeight: .95, letterSpacing: '-0.035em', textTransform: 'uppercase', marginBottom: 56 }}>Four parts. Fourteen chapters.</div>
        <div className="contents-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 32 }}>
          {parts.map(([n, t, ch]) => (
            <div key={n} style={{ borderTop: `3px solid ${T.color.ink}`, paddingTop: 28 }}>
              <div style={{ fontFamily: T.font.head, fontSize: 64, fontWeight: 900, lineHeight: 1, color: T.color.copper, letterSpacing: '-0.04em' }}>{n}</div>
              <div style={{ fontFamily: T.font.head, fontSize: 22, fontWeight: 800, textTransform: 'uppercase', letterSpacing: '-0.02em', margin: '8px 0 24px' }}>{t}</div>
              {ch.map(c => <div key={c} style={{ fontFamily: T.font.body, fontSize: 13, lineHeight: 1.7, color: T.color.ink, padding: '6px 0', borderBottom: `1px solid ${T.color.mist}` }}>{c}</div>)}
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function Excerpt() {
  return (
    <section id="excerpt" className="section-pad" style={{ padding: '120px 56px', background: T.color.page }}>
      <div style={{ maxWidth: 760, margin: '0 auto' }}>
        <Eyebrow>The opening · Preface</Eyebrow>
        <div style={{ fontFamily: T.font.head, fontSize: 40, fontWeight: 900, lineHeight: .95, letterSpacing: '-0.035em', textTransform: 'uppercase', marginBottom: 48 }}>The parking lot.</div>
        <div style={{ fontFamily: T.font.quote, fontSize: 20, lineHeight: 1.8, color: T.color.ink }}>
          <p style={{ marginTop: 0, fontSize: 24, lineHeight: 1.5, fontStyle: 'italic' }}>There are moments that divide a life into before and after. You rarely know it while you&rsquo;re living them. That morning, I knew.</p>
          <p>I was sitting in a white Ford Fiesta in a parking lot in the city of smiles, my hometown. I was not smiling. A Marlboro White burning between my fingers. A corporate envelope on the passenger seat with the official explanation for what my body had already understood: the job was over.</p>
          <p>I did not open it right away. The envelope was just language. My hands already knew what was in it, my chest already knew, and the silence inside that car already knew the exact shape of what had just happened.</p>
          <p>The job wasn&rsquo;t all that was over. I think I knew that too.</p>
          <p>I had started in this industry at eighteen with no diploma, no connections, and no clear narrative. Just hunger and the sharp focus that necessity teaches. Just over a decade of that, and it had ended in twenty minutes in a room with people who were not unkind and who were doing their jobs professionally, with the competence of people handling a process that has to be handled.</p>
          <p style={{ fontFamily: T.font.quote, fontStyle: 'italic', fontSize: 24, lineHeight: 1.4, borderLeft: `3px solid ${T.color.copper}`, paddingLeft: 28, margin: '40px 0', color: T.color.ink }}>
            And yet. I was not alone in that car. Not physically, not visibly, but something was there.
          </p>
          <p>What arrived was presence, quiet and unearned, and it did not leave when I expected it to. It did not solve anything. What changed was underneath, a floor I had not built, holding when everything above it had come apart.</p>
          <p>And then, in the weeks that followed, a quieter thing happened. A person choosing to pay it. My wife stayed.</p>
          <p style={{ opacity: .5, fontStyle: 'italic' }}>continues in the book</p>
        </div>
        <div style={{ marginTop: 48, display: 'flex', gap: 14, flexWrap: 'wrap' }}>
          <Btn kind="solid" href="#">Pre-order the book</Btn>
          <Btn kind="ghost" href="books.html">See all books</Btn>
        </div>
      </div>
    </section>
  );
}

function Praise() {
  const q = [
    ['A rare voice in a crowded genre. Ian writes the middle without flinching.', 'Marcus T.'],
    ['Unsparing, warm, and impossibly honest. A book you will press into someone\u2019s hands.', 'Sarah L.'],
    ['The quiet theology we didn\u2019t know we were waiting for.', 'David R.'],
  ];
  return (
    <section className="section-pad" style={{ padding: '120px 56px', background: T.color.ink, color: T.color.page }}>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <Eyebrow color={T.color.copper}>Early praise</Eyebrow>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 40, marginTop: 40 }}>
          {q.map(([a, b]) => (
            <div key={b}>
              <div style={{ fontFamily: T.font.quote, fontStyle: 'italic', fontSize: 22, lineHeight: 1.4 }}>&ldquo;{a}&rdquo;</div>
              <div style={{ fontFamily: T.font.body, fontSize: 12, fontWeight: 700, letterSpacing: '.15em', textTransform: 'uppercase', color: T.color.copper, marginTop: 20 }}>{b}</div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

    <Hero />

</>);

<script>(function(){var obs=new IntersectionObserver(function(e){e.forEach(function(x){if(x.isIntersecting){x.target.classList.add("in-view");obs.unobserve(x.target);}});},{threshold:0.05,rootMargin:"0px 0px -40px 0px"});var attached=new WeakSet();function attach(){document.querySelectorAll("section").forEach(function(s){if(!attached.has(s)){attached.add(s);obs.observe(s);}});}var tries=0;function poll(){attach();tries++;if(tries<60)setTimeout(poll,100);}if(document.readyState==="complete"){poll();}else{window.addEventListener("load",poll);}})();</script>
