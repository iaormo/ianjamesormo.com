          <div style={{ fontFamily: T.font.quote, fontStyle: 'italic', fontSize: 17, marginTop: 20, maxWidth: 380, lineHeight: 1.5, opacity: .85 }}>Writer of the unglamorous middle. Faith, work, and the long way home.</div>
        </div>

function Hero() {
  return (
    <section className="section-pad" style={{ padding: '96px 56px 48px', background: T.color.page }}>

          <span style={{ display: 'block', color: T.color.copper, whiteSpace: 'nowrap' }}>worth saying.</span>

        <div style={{ fontFamily: T.font.quote, fontStyle: 'italic', fontSize: 22, marginTop: 32, maxWidth: 680, color: T.color.steel, lineHeight: 1.5 }}>
          For press, podcasts, bulk book orders, or just to say hello. I read every message. I reply when I can.
        </div>
      </div>
    </section>
  );
}

function ContactForm() {
  const [form, setForm] = useState({ first: '', last: '', email: '', reason: '', message: '' });
  const [submitted, setSubmitted] = useState(false);
  const reasons = ['General hello', 'Press / interview', 'Podcast guest', 'Bulk book order', 'Something else'];
  const inputStyle = { width: '100%', border: `1px solid ${T.color.mist}`, background: T.color.page, padding: '16px 18px', fontFamily: T.font.body, fontSize: 15, color: T.color.ink, outline: 'none' };
  const labelStyle = { display: 'block', fontFamily: T.font.body, fontSize: 11, fontWeight: 700, letterSpacing: '.22em', textTransform: 'uppercase', color: T.color.copper, marginBottom: 10 };

  function submit(e) {
    e.preventDefault();
    if (form.first && form.email && form.message) setSubmitted(true);
  }

  return (
    <section className="section-pad" style={{ padding: '72px 56px 120px', background: T.color.page }}>
      <div className="contact-grid" style={{ maxWidth: 1200, margin: '0 auto', display: 'grid', gridTemplateColumns: '1fr 380px', gap: 72 }}>
        <div>
          {submitted ? (
            <div style={{ padding: '56px 40px', background: T.color.bone, border: `1px solid ${T.color.mist}` }}>
              <div style={{ fontFamily: T.font.body, fontSize: 11, fontWeight: 700, letterSpacing: '.3em', textTransform: 'uppercase', color: T.color.copper, marginBottom: 16 }}>Thank you</div>
              <div style={{ fontFamily: T.font.quote, fontStyle: 'italic', fontSize: 26, lineHeight: 1.4 }}>Your message landed. I read every one. If it asks for a reply, I will get there.</div>
              <div style={{ fontFamily: T.font.quote, fontStyle: 'italic', fontSize: 18, marginTop: 20, color: T.color.steel }}>Ian</div>
            </div>
          ) : (
            <form onSubmit={submit}>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 24 }}>
                <div>
                  <label style={labelStyle}>First name *</label>
                  <input required type="text" value={form.first} onChange={e => setForm(f => ({ ...f, first: e.target.value }))} style={inputStyle} />
                </div>
                <div>
                  <label style={labelStyle}>Last name</label>
                  <input type="text" value={form.last} onChange={e => setForm(f => ({ ...f, last: e.target.value }))} style={inputStyle} />
                </div>
              </div>
              <div style={{ marginBottom: 24 }}>
                <label style={labelStyle}>Email *</label>
                <input required type="email" value={form.email} onChange={e => setForm(f => ({ ...f, email: e.target.value }))} style={inputStyle} />
              </div>
              <div style={{ marginBottom: 24 }}>
                <label style={labelStyle}>Reason</label>
                <select value={form.reason} onChange={e => setForm(f => ({ ...f, reason: e.target.value }))} style={{ ...inputStyle, appearance: 'none', cursor: 'pointer' }}>
                  <option value="">Choose one</option>
                  {reasons.map(r => <option key={r} value={r}>{r}</option>)}
                </select>
              </div>
              <div style={{ marginBottom: 32 }}>
                <label style={labelStyle}>Message *</label>
                <textarea required rows={6} value={form.message} onChange={e => setForm(f => ({ ...f, message: e.target.value }))} style={{ ...inputStyle, resize: 'vertical', fontFamily: T.font.body }} />
              </div>
              <button type="submit" style={{ background: T.color.ink, color: T.color.page, border: 'none', padding: '18px 36px', fontFamily: T.font.body, fontSize: 12, fontWeight: 700, letterSpacing: '.2em', textTransform: 'uppercase', cursor: 'pointer' }}>
                Send message →
              </button>
            </form>
          )}
        </div>
        <aside>
          <div style={{ padding: '32px 28px', background: T.color.ink, color: T.color.page, marginBottom: 24 }}>
            <div style={{ fontFamily: T.font.body, fontSize: 11, fontWeight: 700, letterSpacing: '.25em', textTransform: 'uppercase', color: T.color.copper, marginBottom: 14 }}>Direct</div>
            <div style={{ fontFamily: T.font.mono, fontSize: 15, marginBottom: 18 }}>hello@ianjamesormo.com</div>
            <div style={{ fontFamily: T.font.quote, fontStyle: 'italic', fontSize: 15, lineHeight: 1.55, opacity: .85 }}>Best for press, podcasts, and anything that needs an actual answer.</div>
          </div>
          <div style={{ padding: '32px 28px', border: `1px solid ${T.color.mist}`, marginBottom: 24 }}>
            <div style={{ fontFamily: T.font.body, fontSize: 11, fontWeight: 700, letterSpacing: '.25em', textTransform: 'uppercase', color: T.color.copper, marginBottom: 14 }}>Response time</div>
            <div style={{ fontFamily: T.font.body, fontSize: 15, lineHeight: 1.6, color: T.color.steel }}>I check email on weekday mornings from Dauin. Expect two or three business days.</div>
          </div>
          <div style={{ padding: '32px 28px', border: `1px solid ${T.color.mist}` }}>

            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              <a href="#" style={{ color: T.color.ink, textDecoration: 'none', fontFamily: T.font.body, fontSize: 14, fontWeight: 500 }}>Instagram →</a>
              <a href="#" style={{ color: T.color.ink, textDecoration: 'none', fontFamily: T.font.body, fontSize: 14, fontWeight: 500 }}>YouTube →</a>
              <a href="newsletter.html" style={{ color: T.color.ink, textDecoration: 'none', fontFamily: T.font.body, fontSize: 14, fontWeight: 500 }}>Newsletter →</a>
            </div>
          </div>
        </aside>
      </div>
    </section>
  );
}

<script>(function(){var obs=new IntersectionObserver(function(e){e.forEach(function(x){if(x.isIntersecting){x.target.classList.add("in-view");obs.unobserve(x.target);}});},{threshold:0.05,rootMargin:"0px 0px -40px 0px"});var attached=new WeakSet();function attach(){document.querySelectorAll("section").forEach(function(s){if(!attached.has(s)){attached.add(s);obs.observe(s);}});}var tries=0;function poll(){attach();tries++;if(tries<60)setTimeout(poll,100);}if(document.readyState==="complete"){poll();}else{window.addEventListener("load",poll);}})();</script>
