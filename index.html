<script type="text/babel">
const T = window.IJ_TOKENS;

function Wordmark({ size = 'md', onDark = false, eyebrow = true, inline = false }) {
  const scale = size === 'sm' ? 0.4 : size === 'md' ? 0.7 : size === 'lg' ? 1.3 : size === 'xl' ? 2 : size;
  const nameColor = onDark ? T.color.page : T.color.ink;
  if (inline) {
    return (
      <span style={{ fontFamily: T.font.head, fontWeight: 900, fontSize: 28 * scale, letterSpacing: '-0.04em', textTransform: 'uppercase', color: nameColor, lineHeight: 1 }}>
        IAN JAMES
      </span>
    );
  }
  return (
    <div style={{ display: 'inline-flex', flexDirection: 'column', lineHeight: 1, gap: 10 * scale }}>
      {eyebrow && (
        <div style={{ fontFamily: T.font.body, fontSize: 13 * scale, fontWeight: 700, letterSpacing: '.28em', textTransform: 'uppercase', color: T.color.copper }}>
          I am
        </div>
      )}
      <div style={{ fontFamily: T.font.head, fontWeight: 900, fontSize: 96 * scale, letterSpacing: '-0.05em', textTransform: 'uppercase', color: nameColor, lineHeight: .85 }}>IAN</div>
      <div style={{ fontFamily: T.font.head, fontWeight: 900, fontSize: 96 * scale, letterSpacing: '-0.05em', textTransform: 'uppercase', color: T.color.copper, lineHeight: .85 }}>JAMES</div>
    </div>
  );
}

function Nav({ active, onDark = false }) {
  const [open, setOpen] = React.useState(false);
  const items = [
    ['home', 'Home', 'index.html'],
    ['about', 'About', 'about.html'],
    ['books', 'Books', 'books.html'],
    ['daily', 'Devotional', 'daily.html'],
    ['essays', 'Musings', 'essays.html'],
    ['contact', 'Contact', 'contact.html'],
  ];
  const c = onDark ? T.color.page : T.color.ink;
  const bg = onDark ? T.color.ink : T.color.page;
  return (
    <nav style={{ position: 'relative', display: 'flex', justifyContent: 'flex-end', alignItems: 'center', padding: '20px 28px', borderBottom: `1px solid ${onDark ? 'rgba(255,255,255,.1)' : T.color.mist}` }}>
      {/* Desktop links */}
      <div className="nav-desktop" style={{ display: 'flex', gap: 28, alignItems: 'center' }}>
        {items.map(([k, label, href]) => (
          <a key={k} href={href} style={{
            textDecoration: 'none', color: c,
            fontFamily: T.font.body, fontSize: 11, fontWeight: 600,
            letterSpacing: '.14em', textTransform: 'uppercase',
            opacity: active === k ? 1 : .55,
            borderBottom: active === k ? `2px solid ${T.color.copper}` : '2px solid transparent',
            paddingBottom: 3, whiteSpace: 'nowrap',
          }}>{label}</a>
        ))}
        <a href="newsletter.html" style={{
          textDecoration: 'none',
          background: T.color.copper, color: T.color.page,
          fontFamily: T.font.body, fontSize: 11, fontWeight: 700, letterSpacing: '.14em', textTransform: 'uppercase',
          padding: '10px 16px', whiteSpace: 'nowrap',
        }}>Subscribe →</a>
      </div>
      {/* Hamburger button — mobile only */}
      <button className="nav-hamburger" onClick={() => setOpen(o => !o)} aria-label="Menu" style={{ display: 'none', background: 'none', border: 'none', cursor: 'pointer', padding: 6 }}>
        <span style={{ display: 'block', width: 22, height: 2, background: c, margin: '5px 0', transition: 'all .2s' }} />
        <span style={{ display: 'block', width: 22, height: 2, background: c, margin: '5px 0', transition: 'all .2s', opacity: open ? 0 : 1 }} />
        <span style={{ display: 'block', width: 22, height: 2, background: c, margin: '5px 0', transition: 'all .2s' }} />
      </button>
      {/* Mobile dropdown */}
      {open && (
        <div style={{ position: 'absolute', top: '100%', left: 0, right: 0, background: bg, borderBottom: `1px solid ${T.color.mist}`, zIndex: 200, padding: '12px 0' }}>
          {items.map(([k, label, href]) => (
            <a key={k} href={href} style={{ display: 'block', padding: '12px 24px', textDecoration: 'none', color: c, fontFamily: T.font.body, fontSize: 13, fontWeight: 600, letterSpacing: '.14em', textTransform: 'uppercase', opacity: active === k ? 1 : .65, borderLeft: active === k ? `3px solid ${T.color.copper}` : '3px solid transparent' }}>{label}</a>
          ))}
          <div style={{ padding: '12px 24px' }}>
            <a href="newsletter.html" style={{ display: 'inline-block', background: T.color.copper, color: T.color.page, padding: '12px 20px', textDecoration: 'none', fontFamily: T.font.body, fontSize: 12, fontWeight: 700, letterSpacing: '.14em', textTransform: 'uppercase' }}>Subscribe →</a>
          </div>
        </div>
      )}

  );
}

function BookCover({ title, subtitle, variant = 'ink', w = 280, h = 420, rotate = 0, shadow = true }) {
  const palettes = {
    ink:    { bg: T.color.ink,    fg: T.color.page, accent: T.color.copper, spine: '#000' },
    copper: { bg: T.color.copper, fg: T.color.page, accent: T.color.ink,    spine: '#7a2f12' },
    page:   { bg: T.color.page,   fg: T.color.ink,  accent: T.color.copper, spine: '#d9d3c5' },
    bone:   { bg: T.color.bone,   fg: T.color.ink,  accent: T.color.copper, spine: '#d9d3c5' },
  };
  const p = palettes[variant] || palettes.ink;
  return (
    <div className="book-cover" style={{
      width: w, height: h, background: p.bg, color: p.fg, position: 'relative',
      boxShadow: `0 0 0 1px rgba(0,0,0,.05), 40px 55px 110px -30px rgba(0,0,0,.55), 14px 22px 44px -10px rgba(0,0,0,.32), inset 10px 0 14px -10px rgba(0,0,0,.45), inset -2px 0 0 rgba(255,255,255,.06)`,
      transform: `perspective(1600px) rotateY(-7deg) rotate(${rotate}deg)`,
      transformOrigin: 'center',
      flexShrink: 0,

    const [today, setToday] = React.useState({

      body: 'Most of your life will be ordinary hours. The meeting that was not remarkable. The dinner that was the same dinner. The prayer that felt like nothing. These are not the waiting room for the real life. They are the life.',
    });

      // Safeguard: fetch the live devotional list and pick today's entry based on date.
      fetch('/api/content/daily').then(r => r.json()).then(list => {
        if (!Array.isArray(list) || list.length === 0) return;
        const todayKey = new Date().toISOString().slice(0, 10);
        const withKeys = list.map(d => {
          const t = Date.parse(d.date);
          return { ...d, _key: isNaN(t) ? '' : new Date(t).toISOString().slice(0, 10) };
        });
        let pick = withKeys.find(d => d._key === todayKey);
        if (!pick) pick = withKeys.filter(d => d._key && d._key <= todayKey).sort((a, b) => (a._key < b._key ? 1 : -1))[0];
        if (!pick) pick = list.find(d => d.today) || list[0];
        const bodyPreview = (pick.body || '').split('\n\n').slice(-1)[0] || pick.body || '';
        setToday({ day: pick.day, verse: pick.verse, quote: pick.quote, body: bodyPreview });
      }).catch(() => {});
