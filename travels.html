function Wordmark({ size = 0.7, onDark = false }) {
  const scale = typeof size === 'number' ? size : 0.7;
  const nameColor = onDark ? T.color.page : T.color.ink;
  return (
    <div style={{ display: 'inline-flex', flexDirection: 'column', lineHeight: 1, gap: 10 * scale }}>
      <div style={{ fontFamily: T.font.head, fontSize: 64 * scale, fontWeight: 900, letterSpacing: '-0.04em', textTransform: 'uppercase', color: nameColor }}>IAN</div>
      <div style={{ fontFamily: T.font.head, fontSize: 64 * scale, fontWeight: 900, letterSpacing: '-0.04em', textTransform: 'uppercase', color: T.color.copper }}>JAMES</div>
      <div style={{ fontFamily: T.font.head, fontSize: 64 * scale, fontWeight: 900, letterSpacing: '-0.04em', textTransform: 'uppercase', color: nameColor }}>ORMO</div>
    </div>
  );
}

function Nav({ active, onDark = false }) {
  const [open, setOpen] = useState(false);
  const items = [['home','Home','index.html'],['about','About','about.html'],['books','Books','books.html'],['daily','Devotional','daily.html'],['essays','Musings','musings.html'],['travels','Travels','travels.html'],['contact','Contact','contact.html']];

  const bg = onDark ? T.color.ink : T.color.page;
  return (
    <nav style={{ position: 'relative', display: 'flex', justifyContent: 'flex-end', alignItems: 'center', padding: '20px 28px', borderBottom: `1px solid ${onDark ? 'rgba(255,255,255,.1)' : T.color.mist}` }}>
      <div className="nav-desktop" style={{ display: 'flex', gap: 28, alignItems: 'center' }}>
        {items.map(([k, label, href]) => (
          <a key={k} href={href} style={{ textDecoration: 'none', color: c, fontFamily: T.font.body, fontSize: 11, fontWeight: 600, letterSpacing: '.14em', textTransform: 'uppercase', opacity: active === k ? 1 : .55, borderBottom: active === k ? `2px solid ${T.color.copper}` : '2px solid transparent', paddingBottom: 3, whiteSpace: 'nowrap' }}>{label}</a>
        ))}
        <a href="newsletter.html" style={{ textDecoration: 'none', background: T.color.copper, color: T.color.page, fontFamily: T.font.body, fontSize: 11, fontWeight: 700, letterSpacing: '.14em', textTransform: 'uppercase', padding: '10px 16px', whiteSpace: 'nowrap' }}>Subscribe →</a>
      </div>
      <button className="nav-hamburger" onClick={() => setOpen(o => !o)} aria-label="Menu" style={{ display: 'none', background: 'none', border: 'none', cursor: 'pointer', padding: 6 }}>
        <span style={{ display: 'block', width: 22, height: 2, background: c, margin: '5px 0' }} />
        <span style={{ display: 'block', width: 22, height: 2, background: c, margin: '5px 0' }} />
        <span style={{ display: 'block', width: 22, height: 2, background: c, margin: '5px 0' }} />
      </button>
      {open && (
        <div style={{ position: 'absolute', top: '100%', left: 0, right: 0, background: bg, borderBottom: `1px solid ${T.color.mist}`, zIndex: 200, padding: '12px 0' }}>
          {items.map(([k, label, href]) => (
            <a key={k} href={href} style={{ display: 'block', padding: '12px 28px', textDecoration: 'none', color: c, fontFamily: T.font.body, fontSize: 14, fontWeight: 600, letterSpacing: '.1em', textTransform: 'uppercase' }}>{label}</a>
          ))}
          <a href="newsletter.html" style={{ display: 'block', padding: '12px 28px', textDecoration: 'none', color: T.color.copper, fontFamily: T.font.body, fontSize: 14, fontWeight: 700, letterSpacing: '.1em', textTransform: 'uppercase' }}>Subscribe →</a>
        </div>
      )}
    </nav>
  );
}

function Footer() {
  return (
    <footer style={{ background: T.color.ink, color: T.color.page, padding: '80px 56px 36px' }}>
      <div className="footer-grid" style={{ display: 'grid', gridTemplateColumns: '2fr 1fr 1fr 1fr', gap: 48, paddingBottom: 56, borderBottom: '1px solid rgba(255,255,255,.1)', maxWidth: 1400, margin: '0 auto' }}>
        <div>

          <div style={{ fontFamily: T.font.quote, fontStyle: 'italic', fontSize: 18, marginTop: 28, maxWidth: 380, lineHeight: 1.5, opacity: .85 }}>
            Writer of the unglamorous middle. Faith, work, and the long way home.
          </div>
        </div>
        {[
          ['Read',   [['Books','books.html'],['Devotional','daily.html'],['Musings','musings.html'],['Travels','travels.html']]],
          ['About',  [['Story','about.html'],['Press / Media','about.html'],['Contact','contact.html']]],
          ['Follow', [['Newsletter','newsletter.html'],['Instagram','https://www.instagram.com/ianormore'],['LinkedIn','https://www.linkedin.com/in/ianjamesormo/'],['Facebook','https://www.facebook.com/ian.ormo']]],
        ].map(([title, links]) => (
          <div key={title}>
            <div style={{ fontFamily: T.font.body, fontSize: 11, fontWeight: 700, letterSpacing: '.25em', textTransform: 'uppercase', color: T.color.copper, marginBottom: 18 }}>{title}</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              {links.map(([l, href]) => (
                <a key={l} href={href} style={{ color: T.color.page, textDecoration: 'none', fontFamily: T.font.body, fontSize: 14, fontWeight: 500, opacity: .75 }}>{l}</a>
              ))}
            </div>
          </div>
        ))}

// ─── TRAVEL ENTRIES ──────────────────────────────────────────────
const travels = [
  {
    slug:    'mayon-hobbit-hill',
    place:   'Mayon Volcano',
    region:  'Ligao, Albay',
    date:    'March 2023',
    title:   'Mayon, from Hobbit Hill.',
    image:   '/images/travels/mayon-hobbit-hill.jpg',
    imageAlt:'Mayon Volcano at sunrise and the family watching at dusk, from Hobbit Hill in Ligao, Albay.',
    body: [
      "We were about six or seven months into it by then. You stop counting the way you stop counting anything after a while. The days blur, and the blur is the point.",
      "We were moving through the Philippines the slow way. Schedule was nobody's but ours. The kids were still on homeschool while we moved, which meant the classroom was wherever we set the table down, and the lessons were whatever the country handed us that week.",
      "Mayon was the stop I had been waiting for without knowing it.",
      "We rented two small nipa huts on a ridge in Ligao. Raised off the ground on wooden stilts, the way the old ones were built. Low ceiling, a small door, the whole thing. People call the place Hobbit Hill. The volcano sits about a kilometer off, a perfect triangle against whatever the sky is doing that hour. From the porch you could watch the sun find it in the morning and lose it in the evening, and in between it mostly stayed still while everything else was doing something.",
      "We only stayed one night. One was enough.",
      "That night we built a fire. The kids did their reading around it. Homeschool in the open, the notebook on a knee, the volcano behind the words. When the fire went down we laid on the grass for a while and looked up. Then we split for the night: me and my oldest in one hut, my wife with our daughter and the youngest in the other. We rarely sleep apart. The stars had already done their work on us before we closed the doors.",
      "The photo on the bottom is from that evening, just before the fire. All five of us at the edge of the ridge, backlit, bunched together. My wife in the middle of the huddle because the middle is where she keeps us. The kids close enough to lean.",
      "The photo on top is the next morning, early, before anyone else was awake. Mine, not theirs. The volcano had already been at work, catching the sun the way it was built to.",
      "We stayed watching for a while before we packed. I mean a while. Nobody was timing anything. The volcano was not going anywhere. We were, but we were not in any hurry about it.",
      "That was the whole thing.",
    ],
  },
];

// ─── PAGE COMPONENTS ─────────────────────────────────────────────
function Hero() {
  return (
    <section className="section-pad" style={{ padding: '120px 56px 48px', background: T.color.page }}>
      <div style={{ maxWidth: 1400, margin: '0 auto' }}>
        <div style={{ fontFamily: T.font.body, fontSize: 11, fontWeight: 700, letterSpacing: '.3em', textTransform: 'uppercase', color: T.color.copper, marginBottom: 20 }}>Travels</div>
        <div className="travels-hero-h" style={{ fontFamily: T.font.head, fontSize: 'min(7.2vw, 108px)', fontWeight: 900, lineHeight: .95, letterSpacing: '-0.045em', textTransform: 'uppercase' }}>
          <span style={{ display: 'block', color: T.color.ink }}>Where we went.</span>
          <span style={{ display: 'block', color: T.color.copper }}>What it took with us.</span>
        </div>
        <div style={{ fontFamily: T.font.quote, fontStyle: 'italic', fontSize: 22, lineHeight: 1.55, color: T.color.steel, marginTop: 32, maxWidth: 760 }}>
          As much as I love to write, we are also a family who loves to travel. We homeschool on the drive, and work in between tent pitches. These are the places that kept asking us to stay a little longer, and what we took with us when we went.
        </div>
      </div>
    </section>
  );
}

function Entry({ e }) {
  // Insert the photo after this many paragraphs so text wraps around it mid-body.
  const photoAfter = 2;
  return (
    <section className="section-pad" style={{ padding: '72px 56px 96px', background: T.color.page }}>
      <article style={{ maxWidth: 960, margin: '0 auto' }}>
        {/* Meta row */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', fontFamily: T.font.mono, fontSize: 12, letterSpacing: '.18em', textTransform: 'uppercase', color: T.color.copper, marginBottom: 20, flexWrap: 'wrap', gap: 12 }}>
          <span>{e.place} · {e.region}</span>
          <span>{e.date}</span>
        </div>
        {/* Title */}
        <h2 style={{ fontFamily: T.font.head, fontSize: 'clamp(32px, 5.4vw, 64px)', fontWeight: 900, lineHeight: 1.02, letterSpacing: '-0.035em', textTransform: 'uppercase', color: T.color.ink, margin: '0 0 36px' }}>
          {e.title}
        </h2>
        {/* Body with photo floated mid-way so text wraps around it */}
        <div className="travel-body" style={{ fontFamily: T.font.quote, fontSize: 22, lineHeight: 1.55, color: T.color.ink }}>
          {e.body.map((p, i) => (
            <React.Fragment key={i}>
              {i === photoAfter && e.image && (
                <figure className="travel-float">
                  <img src={e.image} alt={e.imageAlt} loading="lazy" />
                  <figcaption>{e.place} · {e.date}</figcaption>
                </figure>
              )}
              <p>{p}</p>
            </React.Fragment>
          ))}
        </div>
        <div style={{ marginTop: 48, fontFamily: T.font.body, fontSize: 12, fontWeight: 700, letterSpacing: '.25em', textTransform: 'uppercase', color: T.color.copper }}>Ian</div>
      </article>
    </section>
  );
}

function SubscribeCTA() {
  return (
    <section className="section-pad" style={{ padding: '80px 56px', background: T.color.copper, color: T.color.page }}>
      <div style={{ maxWidth: 1400, margin: '0 auto', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 32 }}>
        <div>
          <div style={{ fontFamily: T.font.body, fontSize: 11, fontWeight: 700, letterSpacing: '.3em', textTransform: 'uppercase', opacity: .7, marginBottom: 16 }}>Honest letters, weekly</div>
          <div style={{ fontFamily: T.font.head, fontSize: 48, fontWeight: 900, lineHeight: .9, letterSpacing: '-0.04em', textTransform: 'uppercase' }}>
            One or two letters<br />every week.
          </div>
        </div>
        <div style={{ maxWidth: 480 }}>
          <div style={{ fontFamily: T.font.quote, fontStyle: 'italic', fontSize: 18, lineHeight: 1.6, opacity: .9, marginBottom: 28 }}>
            Some weeks it is a passage that meets you where you already are. Some weeks it is a question you have been avoiding. Every week it is the thing you actually needed to hear.
          </div>
          <a href="newsletter.html" style={{
            textDecoration: 'none', background: T.color.page, color: T.color.ink,
            padding: '16px 30px', display: 'inline-flex', alignItems: 'center', gap: 10,
            fontFamily: T.font.body, fontSize: 12, fontWeight: 700, letterSpacing: '.18em', textTransform: 'uppercase',
          }}>Subscribe free →</a>
        </div>
      </div>
    </section>
  );
}

function App() {
  return (
    <>
      <Nav active="travels" />
      <Hero />
      {travels.map(e => <Entry key={e.slug} e={e} />)}
      <SubscribeCTA />
      <Footer />
    </>

}

</script>
