const travels = [

    caption: 'We came because of a TV show. The real thing had more to say.',

      "There is a quiet thing about arriving at a place that has been on television. You expect a version of it to already be yours. You have seen it. You know how it ends. It can make you lazy, looking at it, the way you can be lazy looking at a person you think you already know.",

      </div>
      <h2>{e.title}</h2>
      <div className="travel-body" style={{ fontFamily: T.font.quote, fontSize: 22, lineHeight: 1.55, color: T.color.ink }}>
        {e.body.map((p, i) => <p key={i}>{p}</p>)}
      </div>
      <div style={{ marginTop: 32, fontFamily: T.font.body, fontSize: 12, fontWeight: 700, letterSpacing: '.25em', textTransform: 'uppercase', color: T.color.copper }}>Ian</div>
      <button className="travel-story-close" type="button" onClick={onClose}>Close ↑</button>
    </article>
  );
}

function SubscribeCTA() {
  return (
    <section className="section-pad" style={{ padding: '80px 56px', background: T.color.copper, color: T.color.page }}>
      <div style={{ maxWidth: 1400, margin: '0 auto', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 32 }}>
        <div>
          <div style={{ fontFamily: T.font.body, fontSize: 11, fontWeight: 700, letterSpacing: '.3em', textTransform: 'uppercase', opacity: .7, marginBottom: 16 }}>Honest letters, weekly</div>
          <div style={{ fontFamily: T.font.head, fontSize: 48, fontWeight: 900, lineHeight: .9, letterSpacing: '-0.04em', textTransform: 'uppercase' }}>
            One or two letters<br />every week.
          </div>
        </div>
        <div style={{ maxWidth: 480 }}>
          <div style={{ fontFamily: T.font.quote, fontStyle: 'italic', fontSize: 18, lineHeight: 1.6, opacity: .9, marginBottom: 28 }}>
            Some weeks it is a passage that meets you where you already are. Some weeks it is a question you have been avoiding. Every week it is the thing you actually needed to hear.
          </div>
          <a href="newsletter.html" style={{
            textDecoration: 'none', background: T.color.page, color: T.color.ink,
            padding: '16px 30px', display: 'inline-flex', alignItems: 'center', gap: 10,
            fontFamily: T.font.body, fontSize: 12, fontWeight: 700, letterSpacing: '.18em', textTransform: 'uppercase',
          }}>Subscribe free →</a>
        </div>
      </div>
    </section>
  );
}

function App() {
  const [activeSlug, setActiveSlug] = useState(travels[0] ? travels[0].slug : null);
  const active = travels.find(e => e.slug === activeSlug);
  return (
    <>
      <Nav active="travels" />
      <Hero />
      <section className="section-pad" style={{ padding: '24px 56px 0', background: T.color.page }}>
        <div className="travels-grid">
          {travels.map(e => (
            <Card key={e.slug} e={e} active={activeSlug === e.slug} onClick={() => setActiveSlug(s => s === e.slug ? null : e.slug)} />
          ))}
        </div>
      </section>
      {active && (
        <section className="section-pad" style={{ padding: '48px 56px 96px', background: T.color.page }}>
          <Story e={active} onClose={() => setActiveSlug(null)} />
        </section>
      )}
      <SubscribeCTA />
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
