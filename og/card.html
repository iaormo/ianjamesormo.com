<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>OG Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@900&family=Inter:wght@500;700&family=Fraunces:ital,wght@1,400;1,500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; background:#0b0b0b; }
  body { width:1200px; height:630px; overflow:hidden; font-family: Inter, sans-serif; color:#FAF7F2; }
  .card {
    width:1200px; height:630px;
    background: #111111;
    position: relative;
    padding: 72px 80px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .card::before {
    content:''; position:absolute; top:0; right:-100px; width:520px; height:520px;
    background: radial-gradient(circle at center, rgba(184,71,28,.28) 0%, transparent 65%);
    pointer-events:none;
  }
  .card::after {
    content:'IJ'; position:absolute; right: -40px; bottom: -140px;
    font-family: Archivo, sans-serif; font-weight:900; font-size: 560px;
    color: #B8471C; opacity: .08; line-height: 1; letter-spacing: -.06em;
    pointer-events: none;
  }
  .meta { font-family: 'JetBrains Mono', monospace; font-size: 16px; color:#B8471C; letter-spacing: .25em; text-transform: uppercase; z-index:1; position:relative; }
  .quote {
    font-family: Fraunces, Georgia, serif;
    font-style: italic; font-weight: 400;
    font-size: 68px; line-height: 1.14;
    color: #FAF7F2; max-width: 960px; z-index:1; position:relative;
  }
  .quote.small { font-size: 54px; }
  .quote.tiny { font-size: 46px; }
  .bottom {
    display: flex; justify-content: space-between; align-items: flex-end;
    z-index: 1; position: relative;
  }
  .brand {
    display: flex; flex-direction: column; gap: 8px;
  }
  .brand .eyebrow { font-family: Inter, sans-serif; font-size: 13px; font-weight: 700; letter-spacing: .3em; text-transform: uppercase; color:#B8471C; }
  .brand .name    { font-family: Archivo, sans-serif; font-size: 46px; font-weight: 900; letter-spacing: -.03em; text-transform: uppercase; }
  .title {
    font-family: Archivo, sans-serif; font-weight: 900; font-size: 36px;
    letter-spacing: -.02em; text-transform: uppercase; line-height: 1.05;
    max-width: 520px; text-align: right; color:#FAF7F2;
  }
  .tag   { font-family: 'JetBrains Mono', monospace; font-size: 13px; color:#B8471C; letter-spacing:.2em; text-transform: uppercase; margin-bottom: 8px; text-align:right; }
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="meta" id="meta">[ ESSAYS · NO. 014 · APR 18 · 2026 ]</div>
    <div class="quote" id="quote">&ldquo;The room has been there. You just haven&rsquo;t been in it.&rdquo;</div>
    <div class="bottom">
      <div class="brand">
        <span class="eyebrow">I am</span>
        <span class="name">IAN JAMES</span>
      </div>
      <div>
        <div class="tag" id="tag">Presence</div>
        <div class="title" id="title">The room you are already in.</div>
      </div>
    </div>
  </div>
  <script>
  // Populate from URL query params: ?type=essay&num=014&date=Apr 18 · 2026&title=...&quote=...&tag=...
  (function(){
    const p = new URLSearchParams(location.search);
    const type = (p.get('type') || 'essay').toUpperCase();
    const num  = p.get('num') || '014';
    const date = p.get('date') || 'Apr 18 · 2026';
    const title= p.get('title') || 'The room you are already in.';
    const quote= p.get('quote') || 'The room has been there. You just haven\u2019t been in it.';
    const tag  = p.get('tag')   || 'Presence';
    const labelType = type === 'DAILY' ? 'DAILY · DAY' : 'ESSAYS · NO.';
    document.getElementById('meta').textContent = `[ ${labelType} ${num} · ${date.toUpperCase()} ]`;
    const q = document.getElementById('quote');
    q.innerHTML = '\u201c' + quote + '\u201d';
    if (quote.length > 110) q.classList.add('tiny');
    else if (quote.length > 70) q.classList.add('small');
    document.getElementById('title').textContent = title;
    document.getElementById('tag').textContent = tag;
  })();
  </script>
</body>
</html>
